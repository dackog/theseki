<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TheSEKI — 座席割当システム MVP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --ink-light: #4a3f35;
    --paper: #faf7f2;
    --paper-warm: #f2ebe0;
    --paper-dark: #e8ddd0;
    --accent: #c0392b;
    --accent-gold: #b8860b;
    --accent-light: #e8d5b7;
    --green: #2d6a4f;
    --green-light: #d8f3dc;
    --border: #d4c4a8;
    --shadow: rgba(26,20,16,0.12);
    --shadow-deep: rgba(26,20,16,0.24);
    --topbar-h: 56px;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    /* Control system */
    --ctrl-h-desktop: 36px;
    --ctrl-h-mobile: 44px;
    --space-1: 0.25rem;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-6: 1.5rem;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    background: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, var(--border) 31px, var(--border) 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(212,196,168,0.3) 31px, rgba(212,196,168,0.3) 32px);
    background-size: 32px 32px;
  }
  #root {
    min-height: 100dvh;
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }
  .app-shell {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  #app-copyright {
    position: fixed;
    left: 0;
    right: 0;
    bottom: calc(8px + env(safe-area-inset-bottom));
    text-align: center;
    font-size: 12px;
    opacity: 0.7;
    pointer-events: none;
    z-index: 10;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Focus styles */
  :focus { outline: none; }
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: var(--radius-sm);
  }

  /* Topbar */
  .topbar {
    background: var(--ink);
    padding: 0 1.75rem;
    display: flex; align-items: center;
    height: var(--topbar-h);
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--accent);
    box-shadow: 0 2px 12px var(--shadow-deep);
    gap: 0.5rem;
  }
  .topbar-logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem; font-weight: 700;
    color: #fff; letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .topbar-logo span { color: var(--accent); }
  .topbar-nav {
    display: flex; gap: 0.5rem; margin-left: 2rem; flex: 1;
  }
  .nav-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.6);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem; font-weight: 500;
    padding: 0.35rem 0.9rem;
    border-radius: 4px; cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    min-height: var(--ctrl-h-desktop);
    display: inline-flex; align-items: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .nav-btn.active { color: #fff; background: var(--accent); }
  .topbar-event {
    font-size: 0.78rem; color: rgba(255,255,255,0.5);
    border-left: 1px solid rgba(255,255,255,0.15);
    padding-left: 1rem; margin-left: auto;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
  }

  /* Main */
  .main { max-width: 1280px; margin: 0 auto; padding: 2rem; }

  /* Cards */
  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 2px 8px var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--paper-warm);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.95rem; font-weight: 600;
    color: var(--ink-light);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
    padding: 0.45rem 1rem; border-radius: 5px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem; font-weight: 500;
    cursor: pointer; border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    white-space: nowrap; letter-spacing: 0.02em;
    min-height: var(--ctrl-h-desktop); vertical-align: middle;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-primary:hover { background: var(--ink-light); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-accent:hover { background: #a93226; }
  .btn-outline { background: transparent; color: var(--ink-light); border-color: var(--border); }
  .btn-outline:hover { background: var(--paper-warm); border-color: var(--ink-light); }
  .btn-ghost { background: transparent; color: var(--ink-light); border-color: transparent; }
  .btn-ghost:hover { background: var(--paper-dark); }
  .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-green:hover { background: #245a42; }
  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.75rem; }
  .btn-danger { background: transparent; color: var(--accent); border-color: var(--accent); }
  .btn-danger:hover { background: var(--accent); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Inputs */
  input[type=text], input[type=number], input[type=datetime-local], select, textarea {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem; color: var(--ink);
    background: #fff; border: 1px solid var(--border);
    border-radius: 5px; padding: 0.45rem 0.75rem;
    outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--ink-light);
    box-shadow: 0 0 0 3px rgba(74,63,53,0.12);
  }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  label { font-size: 0.8rem; color: var(--ink-light); font-weight: 500; display: block; margin-bottom: 0.35rem; line-height: 1.4; }

  /* Tags/Chips */
  .tag {
    display: inline-flex; align-items: center; gap: 0.3rem;
    background: var(--accent-light); color: var(--ink-light);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 0.18rem 0.65rem;
    font-size: 0.72rem; font-weight: 500;
  }
  .tag-remove { cursor: pointer; color: var(--ink-light); opacity: 0.5; font-size: 0.9rem; }
  .tag-remove:hover { opacity: 1; color: var(--accent); }
  .tag-ng { background: #fde8e8; border-color: #f5a5a5; color: var(--accent); }

  /* Page: Events */
  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
  .event-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: 0 2px 8px var(--shadow);
    padding: 1.25rem;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    position: relative;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .event-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--accent);
  }
  .event-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow-deep); }
  .event-card-title { font-family: 'Noto Serif JP', serif; font-size: 1.05rem; font-weight: 600; margin-bottom: 0.5rem; padding-left: 0.5rem; }
  .event-card-meta { font-size: 0.75rem; color: var(--ink-light); padding-left: 0.5rem; }
  .event-card-actions { display: flex; gap: 0.5rem; margin-top: 1rem; padding-left: 0.5rem; }

  /* Page: Layout */
  .layout-grid { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; }
  .tables-area { display: flex; flex-direction: column; gap: 1rem; }
  .table-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .table-card-head {
    background: var(--paper-warm);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .table-name-input { font-family: 'Noto Serif JP', serif; font-weight: 600; max-width: 120px; }
  .seats-preview { padding: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .seat-chip {
    width: 52px; height: 36px;
    background: var(--paper-warm);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: var(--ink-light);
    font-weight: 500;
  }
  .seat-chip.occupied { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .seat-chip.ng-violation { background: #fde8e8; border-color: var(--accent); color: var(--accent); }

  /* Page: Attendees */
  .attendees-layout { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; }
  .attendee-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.75rem; align-items: center;
    padding: 0.75rem 1.1rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .attendee-row:last-child { border-bottom: none; }
  .attendee-row:hover { background: var(--paper-warm); }
  .attendee-name { font-weight: 500; font-size: 0.9rem; line-height: 1.4; }
  .attendee-flags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.25rem; }

  /* Page: Assign */
  .assign-layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; align-items: start; }
  .assign-sidebar { position: sticky; top: 72px; }
  .attendee-item {
    padding: 0.55rem 0.9rem;
    border-radius: 6px; cursor: pointer;
    font-size: 0.84rem; font-weight: 500;
    background: var(--paper-warm);
    border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 0.25rem;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .attendee-item:hover { background: var(--accent-light); border-color: var(--accent); }
  .attendee-item.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .attendee-item .item-flags { display: flex; gap: 0.25rem; flex-wrap: wrap; }
  .table-assign-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1rem;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .table-assign-card.has-violation { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(192,57,43,0.2); }
  .table-assign-head {
    background: var(--paper-warm);
    border-bottom: 1px solid var(--border);
    padding: 0.65rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-assign-head-name { font-family: 'Noto Serif JP', serif; font-weight: 600; font-size: 0.9rem; }
  .seats-grid { padding: 0.75rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.5rem; }
  .seat-slot {
    min-height: 60px; border-radius: 6px;
    border: 1.5px dashed var(--border);
    background: var(--paper-warm);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; padding: 0.35rem;
    transition: all 0.15s; text-align: center;
    font-size: 0.7rem; color: var(--ink-light);
    position: relative;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .seat-slot:hover { border-color: var(--ink-light); background: var(--paper-dark); }
  .seat-slot.filled { background: var(--green-light); border-color: var(--green); border-style: solid; }
  .seat-slot.filled:hover { background: #c3e8ce; }
  .seat-slot.violation { background: #fde8e8; border-color: var(--accent); border-style: solid; }
  .seat-slot.drop-target { border-color: var(--accent-gold); background: #fdf3d0; border-style: solid; }
  .seat-attendee-name { font-size: 0.78rem; font-weight: 600; color: var(--ink); }
  .seat-id-label { font-size: 0.62rem; color: var(--ink-light); margin-top: 0.1rem; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(26,20,16,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(2px);
    animation: fadeIn 0.15s ease;
    padding: 1rem;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--paper);
    border-radius: var(--radius-lg); min-width: 380px; max-width: 520px; width: min(100%, 520px);
    box-shadow: 0 24px 64px var(--shadow-deep);
    border: 1px solid var(--border);
    animation: slideUp 0.2s ease;
    max-height: 90vh; max-height: 90dvh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal-header {
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 2; background: var(--paper);
  }
  .modal-title { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 700; }
  .modal-close {
    background: none; border: none; cursor: pointer; font-size: 1.4rem;
    color: var(--ink-light); line-height: 1; padding: 0.25rem; flex-shrink: 0;
    border-radius: var(--radius-sm); transition: color 0.1s, background 0.1s;
  }
  .modal-close:hover { color: var(--ink); background: var(--paper-dark); }
  .modal-body {
    padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem;
    overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; min-height: 0;
  }
  .modal-footer {
    padding: 1rem 1.5rem calc(1rem + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 0.75rem; justify-content: flex-end;
    position: sticky; bottom: 0; z-index: 2; background: var(--paper);
  }

  .rule-header-wrap { position: relative; display: inline-flex; align-items: center; gap: 0.28rem; }
  .rule-help-btn {
    width: 1rem; height: 1rem; border-radius: 50%; border: 1px solid var(--border);
    background: var(--paper); color: var(--ink-light); font-size: 0.68rem; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;
  }
  .rule-help-btn:focus-visible { outline: 2px solid rgba(74,63,53,0.35); outline-offset: 1px; }
  .rule-tooltip {
    position: absolute; top: 100%; bottom: auto; left: 50%; transform: translate(-50%, 8px);
    min-width: 170px; max-width: min(220px, calc(100vw - 4rem)); width: max-content;
    padding: 0.45rem 0.55rem; border-radius: 6px; border: 1px solid var(--border);
    background: rgba(255,252,246,0.98); color: var(--ink); font-size: 0.73rem; line-height: 1.45;
    box-shadow: 0 6px 18px rgba(26,20,16,0.14); text-align: left; z-index: 20;
    pointer-events: none;
  }
  .rule-tooltip.align-right { left: auto; right: 0; transform: translateY(8px); }

  .event-action-btns {

  .event-action-btns .btn-main .btn-icon { font-size: 1.4rem; }

  .event-sub-btns {

  .assign-status-banner {

  /* ═══════════════════════════════════════════════════
     レイアウトヘルパー & 再利用可能ユーティリティ
  ═══════════════════════════════════════════════════ */

  /* Page header row: title on left, action buttons on right */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem;
  }
  .page-header > .page-title { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }

  /* Stat chip — small pill label used in dark toolbars */
  .stat-chip {
    font-size: 0.72rem;
    background: rgba(255,255,255,0.1);
    padding: 2px 10px; border-radius: 20px;
    color: rgba(255,255,255,0.88);
  }

  /* LayoutPage floor toolbar */
  .floor-toolbar {
    background: var(--ink);
    border-bottom: 1px solid rgba(255,255,255,0.08);

  .floor-toolbar-stats { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .floor-toolbar-actions { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

  /* AssignPage — dark grid floor canvas */
  .assign-floor-canvas {
    background: #1a1f2e;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;

  .assign-floor-canvas::-webkit-scrollbar { width: 6px; height: 6px; }
  .assign-floor-canvas::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
  .assign-floor-canvas::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  .assign-floor-canvas::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.35); }
  .assign-floor-canvas-inner {
    display: flex; flex-wrap: wrap;
    gap: 2.5rem; align-items: flex-start; justify-content: center;
  }

  /* AssignPage — unassigned attendee scroll list */
  .assign-attendee-list {
    display: flex; flex-direction: column;
    gap: 0.35rem; max-height: 48vh; overflow-y: auto;
  }
  .assign-attendee-list::-webkit-scrollbar { width: 5px; }
  .assign-attendee-list::-webkit-scrollbar-track { background: transparent; }
  .assign-attendee-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* AssignPage — selection state hint box in sidebar */
  .selection-hint {
    margin-top: 0.75rem; padding: 0.65rem 0.9rem;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.75rem; color: var(--ink-light); line-height: 1.75;
    background: var(--paper-warm);
  }
  .selection-hint.has-selection { background: var(--accent-light); }

  /* ViewPage — read-only mode banner */
  .view-banner {
    background: var(--accent-light); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.75rem 1.25rem;
    margin-bottom: 1.5rem; font-size: 0.84rem; color: var(--ink-light);
  }

  /* Topbar — auto-save status indicator */
  .topbar-status { font-size: 0.72rem; transition: color 0.3s; min-width: 56px; white-space: nowrap; }

  /* Attendee row action buttons */
  .attendee-row-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  /* Inner navigation bar (breadcrumb + tab switcher) */
  .inner-nav-wrap {
    position: sticky;
    top: 0; z-index: 90;
    background: var(--paper-warm);
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 1.5rem;
    display: flex; align-items: center; gap: 0.75rem;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════
     スマホ対応 (max-width: 768px)
  ═══════════════════════════════════════ */
  @media (max-width: 768px) {
    html, body, #root { overflow-x: hidden; }

    /* ── トップバー ── */
    .topbar { padding: 0 0.85rem; height: 52px; position: sticky; top: 0; z-index: 120; }
    .topbar-logo { font-size: 1.05rem; }
    .topbar-nav { margin-left: 0.6rem; gap: 0.2rem; }
    .nav-btn { font-size: 0.73rem; padding: 0.28rem 0.55rem; min-height: var(--ctrl-h-mobile); }
    .topbar-actions-desktop { display: none !important; }

    /* ── メイン余白 ── */
    .main { padding: 0.9rem; }

    /* ── InnerNav ── */
    .inner-nav-wrap {
      padding: 0.6rem 0.85rem;
      flex-wrap: wrap; gap: 0.4rem;
    }
    .inner-nav-back { font-size: 0.75rem; }

      font-size: 0.8rem;
      max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .inner-nav-tabs button { flex: 1; font-size: 0.8rem; padding: 0.5rem 0.5rem; min-height: var(--ctrl-h-mobile); }

    /* ── イベント一覧 ── */
    .events-grid { grid-template-columns: 1fr; gap: 0.875rem; margin-top: 1rem; }
    .event-card { padding: 1rem 1rem 0.9rem; }
    .event-card-title { font-size: 1rem; }

    .event-action-btns .btn-main .btn-icon { font-size: 1.25rem; }
    .event-sub-btns { gap: 0.5rem; }
    .event-sub-btns .btn {
      flex: 1;
      min-height: 44px;
      font-size: 0.82rem;
      padding: 0.55rem 0.8rem;
    }
    .event-sub-btn { gap: 0.38rem; }

    /* ── 参加者管理 ── */
    .attendee-row { grid-template-columns: 1fr; gap: 0.5rem; padding: 0.875rem 1rem; }
    .attendee-row-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .attendee-row-actions .btn { flex: 1; min-height: var(--ctrl-h-mobile); justify-content: center; }

    /* ── 席割り ── */
    .assign-layout { grid-template-columns: 1fr; gap: 0.75rem; }
    .assign-sidebar { position: static; }
    .assign-sidebar-inner { max-height: 220px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .assign-floor-view {
      min-height: 480px !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
      padding: 1rem !important;
    }
    .assign-status-banner { position: static; }
    .main { padding-bottom: 2rem; }

    .floor-fab { display: none !important; }

    /* ── ページタイトル ── */
    .page-title { font-size: 1.2rem; margin-bottom: 1rem; }

    /* ── モーダル ── */
    .modal {
      min-width: unset; width: 100%;
      margin: 0; border-radius: var(--radius-lg);
      max-height: 92vh;
    }
    .modal-backdrop { padding: 0.75rem; align-items: center; }
    .modal-body { padding: 1rem 1.1rem; gap: 0.875rem; }
    .modal-footer { padding: 0.875rem 1.1rem; }
    /* モーダル閉じるボタン：44px タッチターゲット確保 */
    .modal-close {
      min-width: var(--ctrl-h-mobile);
      min-height: var(--ctrl-h-mobile);
      display: flex; align-items: center; justify-content: center;
    }

    /* ── 通知 ── */
    .notification { bottom: 0.85rem; right: 0.85rem; left: 0.85rem; max-width: unset; }

    /* ── ボタン全般 (44px タッチターゲット) ── */
    .btn { font-size: 0.8rem; padding: 0.42rem 0.85rem; min-height: var(--ctrl-h-mobile); }
    .btn-sm { font-size: 0.75rem; padding: 0.32rem 0.65rem; min-height: var(--ctrl-h-mobile); }

    /* ── 入力フォーム (iOS auto-zoom防止 + 44px タッチターゲット) ── */
    input, select, textarea {
      font-size: 16px; /* iOS zoom防止: 16px 未満はズームが発生 */
    }
    input:not([type=radio]):not([type=checkbox]):not([type=file]),
    select {
      min-height: var(--ctrl-h-mobile);
    }
    /* tag-input-area 内の input は親コンテナが min-height を持つため個別制御 */
    .tag-input-area {
      min-height: var(--ctrl-h-mobile);
    }
    .tag-input-area input {
      font-size: 16px;
      min-height: 0;
    }

    /* ── サブページシェル ── */
    .inner-nav-wrap { top: 52px; z-index: 110; }
    .event-subpage-shell {
      min-height: calc(100dvh - 52px) !important;
      height: auto !important;
      background: var(--paper);
    }
    .event-subpage-content {
      min-height: auto;
      display: block !important;
      overflow: visible !important;
      flex: none !important;
      background: var(--paper);
    }
  }

  @media (max-width: 400px) {
    .topbar-logo { font-size: 0.95rem; }
    .nav-btn { font-size: 0.68rem; padding: 0.22rem 0.45rem; }
    .main { padding: 0.75rem; }
    .event-action-btns { gap: 0.35rem; }
  }

  /* ── Floor Map ── */
  .floor-layout-shell { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .floor-layout { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 0; flex: 1; min-height: 0; overflow: hidden; }
  .floor-layout.panel-collapsed { grid-template-columns: minmax(0,1fr); }
  .floor-layout {

  }

    --floor-table-gradient: linear-gradient(145deg, #f8f8f8, #d9d9d9 60%, #bdbdbd);
    --floor-chair-empty-bg: linear-gradient(145deg, #f6f6f6, #d9d9d9);
    --floor-chair-empty-color: #666;
    --floor-chair-occupied-bg: linear-gradient(145deg, #444, #101010);

    --floor-panel-bg: #f8f8f8;

  .floor-layout.theme-cute {

  .floor-layout.theme-stylish {

    --floor-chair-empty-bg: radial-gradient(circle at 35% 30%, #3b4668, #12172a);
    --floor-chair-empty-color: #9db0de;
    --floor-chair-occupied-bg: radial-gradient(circle at 35% 30%, #5a74b7, #1c2a4f);
    --floor-chair-occupied-color: #e9efff;
    --floor-panel-bg: #131a2d;
    --floor-panel-header-bg: #1b2540;
    --floor-dot-empty: #3c4668;
    --floor-dot-occupied: #6a89d6;
    --floor-dot-violation: #e05b73;
  }
  .floor-canvas-wrap {
    width: 1122px; height: 794px; margin: 0 auto;
    background: var(--floor-bg);
    background-image:
      linear-gradient(var(--floor-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--floor-grid) 1px, transparent 1px);
    background-size: 40px 40px;
    overflow: auto; position: relative;
    cursor: default;
  }
  .floor-canvas-region { min-width: 0; min-height: 0; overflow: auto; padding: 0.75rem; }
  .floor-canvas { position: relative; width: 1122px; height: 794px; min-width: 1122px; min-height: 794px; }
  .floor-empty {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; color: rgba(255,255,255,0.2);
    pointer-events: none;
  }
  .floor-empty-icon { font-size: 4rem; margin-bottom: 1rem; }
  .floor-empty-text { font-size: 1rem; }

  /* 卓グループ */
  .floor-table-group {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; cursor: grab;
    transition: filter 0.15s;
  }
  .floor-table-group:active { cursor: grabbing; }
  .floor-table-group.selected .floor-table-top { box-shadow: 0 0 0 3px var(--accent-gold), 0 4px 20px rgba(0,0,0,0.6); }

    color: var(--floor-label-color); font-size: 0.72rem; font-weight: 700;

  /* 木目ライン */
  .floor-table-top::after {
    content: '';

  .floor-panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .floor-table-item {
    background: var(--paper);

        repeating-linear-gradient(0deg, transparent, transparent 31px, var(--border) 31px, var(--border) 32px),
        repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(212,196,168,0.3) 31px, rgba(212,196,168,0.3) 32px);
      background-size: 32px 32px;
    }
  }

  /* ═══════════════════════════════════════════════════
     デスクトップ・サブページシェル高さ修正
     inline style の 52px を正しい --topbar-h (56px) で上書き
  ═══════════════════════════════════════════════════ */
  @media (min-width: 769px) {
    .event-subpage-shell {
      height: calc(100dvh - var(--topbar-h)) !important;
    }
  }

  /* ═══════════════════════════════════════════════════
     サブページコンテンツ：フレックス伸縮＋単一スクロール
     LayoutPage → floor-layout-shell が flex:1 で充填
     AssignPage → .main がオーバーフロー時にここでスクロール
  ═══════════════════════════════════════════════════ */
  .event-subpage-content {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ═══════════════════════════════════════════════════
     席割りサイドバー：スクロールコンテナ基準で sticky
  ═══════════════════════════════════════════════════ */
  .assign-sidebar {
    position: sticky;
    top: 0;
  }

  /* ═══════════════════════════════════════════════════
     フロアツールバー select：ボタンと高さを揃える
  ═══════════════════════════════════════════════════ */
  .floor-toolbar select {
    height: var(--ctrl-h-desktop);
    min-height: var(--ctrl-h-desktop);
  }

  /* ═══════════════════════════════════════════════════
     無効化ボタンの視認性向上
  ═══════════════════════════════════════════════════ */
  .btn:disabled {
    opacity: 0.38;
    cursor: not-allowed;
    filter: grayscale(0.3);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ============================================================
// Utility / localStorage  ── Task2: 永続化レイヤー
// ============================================================
const LS_KEY = 'theseki_v2';
const SCHEMA_VERSION = 2;
const PDF_SETTINGS_KEY = 'theseki_pdf_settings_v1';
const DEFAULT_PDF_SETTINGS = {
  orientation: 'landscape',
  fitMode: 'cover',
  showLogo: true,
  logoSize: 'medium',
  marginMm: 0,
};

/** データ整合性クリーニング: 孤立assignment・NG等を自動除去 */
function sanitizeEvent(ev) {
  if (!ev) return ev;
  const attendeeIds = new Set((ev.attendees||[]).map(a=>a.id));
  const tableIds    = new Set((ev.tables||[]).map(t=>t.id));
  // 座席IDセット
  const seatIds = new Set();
  (ev.tables||[]).forEach(t=>{ for(let i=1;i<=t.seatCount;i++) seatIds.add(`${t.name}-${i}`); });

  // assignments: 存在しない参加者・座席を除去
  const assignments = {};
  Object.entries(ev.assignments||{}).forEach(([sid,aid])=>{
    if (seatIds.has(sid) && (!aid || attendeeIds.has(aid))) assignments[sid]=aid;
  });
  // ngPairs: 両者が存在する場合のみ残す
  const ngPairs = (ev.ngPairs||[]).filter(p=>attendeeIds.has(p.a)&&attendeeIds.has(p.b));
  const lockedAttendees = {};
  Object.entries(ev.lockedAttendees||{}).forEach(([aid,locked])=>{
    if (locked && attendeeIds.has(aid)) lockedAttendees[aid] = true;
  });
  const customRule = ev.customRule === 'gather' ? 'gather' : 'disperse';
  const customGatherFlags = [...new Set((ev.customGatherFlags||[]).filter(f=>typeof f === 'string' && f.trim()))].slice(0,4);
  const customRules = Array.isArray(ev.customRules)
    ? ev.customRules
      .filter(r => r && typeof r.flag === 'string' && r.flag.trim() && (r.mode === 'distribute' || r.mode === 'gather'))
      .map(r => ({ flag: r.flag.trim(), mode: r.mode }))
      .slice(0,4)
    : customGatherFlags.map(flag => ({ flag, mode: customRule === 'gather' ? 'gather' : 'distribute' }));
  return {...ev, assignments, ngPairs, lockedAttendees, customRule, customGatherFlags, customRules};
}

function getFlagRulesFromLegacy(customRule, customGatherFlags) {
  const flags = [...new Set((customGatherFlags||[]).filter(f=>typeof f === 'string' && f.trim()))].slice(0,4);
  const mode = customRule === 'gather' ? 'gather' : 'distribute';
  return flags.map(flag => ({ flag, mode }));
}

function normalizeFlagRules(rules, customRule, customGatherFlags) {
  const base = Array.isArray(rules) ? rules : getFlagRulesFromLegacy(customRule, customGatherFlags);
  return [...new Map(base
    .filter(r => r && typeof r.flag === 'string' && r.flag.trim() && (r.mode === 'distribute' || r.mode === 'gather'))
    .map(r => [`${r.flag.trim()}__${r.mode}`, { flag: r.flag.trim(), mode: r.mode }]))
    .values()].slice(0,4);
}

/** v1 → v2 マイグレーション */
function migrate(raw) {
  if (!raw) return null;
  // v1はversionフィールドなし
  if (!raw.version || raw.version < 2) {
    return {
      version: SCHEMA_VERSION,
      events: (raw.events||[]).map(e=>sanitizeEvent({
        tables: [], attendees: [], ngPairs: [], assignments: {}, ...e
      })),
      currentEventId: raw.currentEventId || null,
    };
  }
  return raw;
}

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    // 旧キーからの移行
    if (!raw) {
      const old = JSON.parse(localStorage.getItem('theseki_v1') || 'null');
      if (old) return migrate(old);
      return null;
    }
    return migrate(raw);
  } catch(e) {
    console.warn('[TheSEKI] ストレージ読み込みエラー。リセットします。', e);
    return null;
  }
}

let _saveErrorShown = false;
function saveState(s) {
  try {
    const payload = JSON.stringify({...s, version: SCHEMA_VERSION});
    localStorage.setItem(LS_KEY, payload);
    _saveErrorShown = false;
  } catch(e) {
    if (!_saveErrorShown) {
      _saveErrorShown = true;
      console.error('[TheSEKI] 保存失敗（容量超過の可能性）', e);
      // 通知はApp側でハンドル
      window.dispatchEvent(new CustomEvent('theseki:saveerror', {detail: e.message}));
    }
  }
}

/** イベント単位でJSONエクスポート */
function exportEventJSON(ev) {
  const blob = new Blob([JSON.stringify({version: SCHEMA_VERSION, event: sanitizeEvent(ev)}, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `theseki_event_${ev.id}.json`; a.click();
  URL.revokeObjectURL(url);
}

/** JSONからイベントをインポート → 新IDで追加 */
function parseImportedEvent(text) {
  const data = JSON.parse(text);
  const ev = data.event || data; // フォールバック
  if (!ev.name) throw new Error('イベント名が見つかりません');
  const newId = uid();
  const idMap = {}; // old attendeeId → new attendeeId
  const newAttendees = (ev.attendees||[]).map(a=>{ const nid=uid(); idMap[a.id]=nid; return {...a,id:nid,eventId:newId}; });
  const newTables = (ev.tables||[]).map(t=>({...t,id:uid(),eventId:newId}));
  const newNg = (ev.ngPairs||[]).map(p=>({...p,id:uid(),a:idMap[p.a]||p.a,b:idMap[p.b]||p.b})).filter(p=>p.a&&p.b);
  // assignments: seatId はテーブル名ベースなので再構築
  const tableNameMap = {};
  (ev.tables||[]).forEach((ot,i)=>{ tableNameMap[ot.name]=newTables[i]?.name||ot.name; });
  const newAssign = {};
  Object.entries(ev.assignments||{}).forEach(([sid,aid])=>{
    // seatId = "T1-1" 形式。テーブル名部分を置換
    const [tname,...rest]=sid.split('-'); const newSid=(tableNameMap[tname]||tname)+'-'+rest.join('-');
    newAssign[newSid] = idMap[aid]||null;
  });
  const newLocked = {};
  Object.entries(ev.lockedAttendees||{}).forEach(([aid,locked])=>{
    if (locked && idMap[aid]) newLocked[idMap[aid]] = true;
  });
  return sanitizeEvent({...ev, id:newId, name:ev.name+' (インポート)', createdAt:now(), updatedAt:now(),
    tables:newTables, attendees:newAttendees, ngPairs:newNg, assignments:newAssign, lockedAttendees:newLocked});
}

/** 閲覧用URLハッシュ生成（イベントデータをBase64圧縮） */
function buildShareURL(ev) {
  try {
    const json = JSON.stringify(sanitizeEvent(ev));
    const encoded = btoa(encodeURIComponent(json));
    const url = `${location.href.split('#')[0]}#view=${encoded}`;
    return url;
  } catch { return null; }
}

/** URLハッシュから閲覧イベントを復元 */
function loadSharedEvent() {
  try {
    const hash = location.hash;
    if (!hash.startsWith('#view=')) return null;
    const encoded = hash.slice(6);
    const json = decodeURIComponent(atob(encoded));
    return JSON.parse(json);
  } catch { return null; }
}

function uid() { return Math.random().toString(36).slice(2,10); }
function now() { return new Date().toISOString(); }
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function generateSeats(tables) {
  const seats = [];
  tables.forEach(t => {
    for (let i = 1; i <= t.seatCount; i++) {
      seats.push({ id: `${t.name}-${i}`, tableId: t.id, eventId: t.eventId, index: i });
    }
  });
  return seats;
}

// NG check
function checkViolations(tables, seats, assignments, ngPairs, attendees) {
  const violations = [];
  tables.forEach(table => {
    const tableSeats = seats.filter(s => s.tableId === table.id);
    const tableAttendees = tableSeats
      .map(s => assignments[s.id])
      .filter(Boolean);
    ngPairs.forEach(ng => {
      if (tableAttendees.includes(ng.a) && tableAttendees.includes(ng.b)) {
        const aName = attendees.find(x=>x.id===ng.a)?.name || '?';
        const bName = attendees.find(x=>x.id===ng.b)?.name || '?';
        violations.push({ tableId: table.id, tableName: table.name, a: ng.a, b: ng.b, aName, bName });
      }
    });
  });
  return violations;
}

async function downloadFloorPdf({ element, eventName, settings, floorObjects=[] }) {
  if (!element || !window.html2canvas || !window.jspdf?.jsPDF) throw new Error('PDFライブラリの読み込みに失敗しました');

  const opts = {
    orientation: settings?.orientation === 'portrait' ? 'portrait' : 'landscape',
    fitMode: settings?.fitMode === 'contain' ? 'contain' : 'cover',
    marginMm: Number.isFinite(settings?.marginMm) ? Math.max(0, settings.marginMm) : 0,
    showLogo: settings?.showLogo !== false,
    logoSize: settings?.logoSize || 'medium',
  };
  const logoSizePxMap = { small: 80, medium: 120, large: 160 };
  const logoSizePx = logoSizePxMap[opts.logoSize] || logoSizePxMap.medium;

  const sourceWrap = element.closest('.floor-canvas-wrap');
  const sourceLayout = element.closest('.floor-layout');
  const pdfHost = document.createElement('div');
  pdfHost.setAttribute('aria-hidden', 'true');
  Object.assign(pdfHost.style, {
    position: 'fixed',
    left: '-100000px',
    top: '0',
    pointerEvents: 'none',
    zIndex: '-1',
  });

  const pagePxW = opts.orientation === 'portrait' ? 1191 : 1684;
  const pagePxH = opts.orientation === 'portrait' ? 1684 : 1191;

  const page = document.createElement('div');
  page.id = 'pdf-layout';
  Object.assign(page.style, {
    width: `${pagePxW}px`,
    height: `${pagePxH}px`,
    position: 'relative',
    overflow: 'hidden',
    background: '#ffffff',
  });
  const floorFrame = document.createElement('div');
  floorFrame.className = 'floor-canvas-wrap';
  const sourceWrapStyles = sourceWrap ? window.getComputedStyle(sourceWrap) : null;
  const sourceWidth = element.scrollWidth || element.offsetWidth || 1122;
  const sourceHeight = element.scrollHeight || element.offsetHeight || 794;
  Object.assign(floorFrame.style, {
    width: `${sourceWidth}px`,
    height: `${sourceHeight}px`,
    margin: '0',
    overflow: 'hidden',
    position: 'relative',
    backgroundColor: sourceWrapStyles?.backgroundColor || '#1a1f2e',
    backgroundImage: sourceWrapStyles?.backgroundImage || 'none',
    backgroundSize: sourceWrapStyles?.backgroundSize || 'auto',
  });
  if (sourceLayout) {
    const layoutStyles = window.getComputedStyle(sourceLayout);
    for (let i = 0; i < layoutStyles.length; i++) {
      const prop = layoutStyles[i];
      if (prop.startsWith('--floor-')) {
        floorFrame.style.setProperty(prop, layoutStyles.getPropertyValue(prop));
      }
    }
  }
  floorFrame.appendChild(element.cloneNode(true));

  floorObjects.forEach((obj) => {
    const node = document.createElement('div');
    node.className = 'floor-object';
    node.textContent = `${obj.icon || '📍'} ${obj.label || 'オブジェクト'}`;
    Object.assign(node.style, {
      left: `${Math.max(0, obj.x || 0)}px`,
      top: `${Math.max(0, obj.y || 0)}px`,
      transform: 'none',
    });
    floorFrame.appendChild(node);
  });

  const contentSlot = document.createElement('div');
  Object.assign(contentSlot.style, {
    position: 'absolute',
    inset: '0',
  });
  contentSlot.appendChild(floorFrame);
  page.appendChild(contentSlot);

  if (opts.showLogo) {
    const logoRoot = document.createElement('div');
    Object.assign(logoRoot.style, {
      position: 'absolute',
      left: '16px',
      top: '12px',
      zIndex: '5',
      transformOrigin: 'top left',
      transform: `scale(${Math.max(0.6, logoSizePx / 120)})`,
    });
    const topbarLogo = document.querySelector('.topbar-logo');
    if (topbarLogo) {
      const logoClone = topbarLogo.cloneNode(true);
      logoClone.style.margin = '0';
      logoClone.style.color = '#1a1410';
      const logoAccent = logoClone.querySelector('span');
      if (logoAccent) logoAccent.style.color = '#c0392b';
      logoRoot.appendChild(logoClone);
    } else {
      logoRoot.textContent = 'The SEKI';
      logoRoot.style.fontSize = '24px';
      logoRoot.style.fontWeight = '700';
      logoRoot.style.color = '#1a1410';
    }
    page.appendChild(logoRoot);
  }

  pdfHost.appendChild(page);
  document.body.appendChild(pdfHost);

  try {
    if (document.fonts?.ready) await document.fonts.ready;
    const canvas = await window.html2canvas(floorFrame, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      width: sourceWidth,
      height: sourceHeight,
    });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: opts.orientation, unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const targetW = Math.max(0, pageW - opts.marginMm * 2);
    const targetH = Math.max(0, pageH - opts.marginMm * 2);
    const imgW = canvas.width;
    const imgH = canvas.height;

    const scale = opts.fitMode === 'cover'
      ? Math.max(targetW / imgW, targetH / imgH)
      : Math.min(targetW / imgW, targetH / imgH);
    const drawW = imgW * scale;
    const drawH = imgH * scale;
    const offsetX = (targetW - drawW) / 2;
    const offsetY = (targetH - drawH) / 2;

    pdf.addImage(imgData, 'PNG', opts.marginMm + offsetX, opts.marginMm + offsetY, drawW, drawH);
    const safeName = (eventName || 'seats').replace(/[\/:*?"<>|]/g, '_');
    pdf.save(`${safeName}_seat-layout.pdf`);
  } finally {
    if (pdfHost.parentNode) pdfHost.parentNode.removeChild(pdfHost);
  }
  return;
}

// ============================================================
// Initial state
// ============================================================
const DEFAULT_STATE = {
  events: [],
  currentEventId: null,
};

// ============================================================
// Notification
// ============================================================
function useNotify() {
  const [note, setNote] = useState(null);
  const timer = useRef(null);
  const notify = useCallback((msg, type='success') => {
    clearTimeout(timer.current);
    setNote({ msg, type });
    timer.current = setTimeout(() => setNote(null), 3200);
  }, []);
  return [note, notify];
}

// ============================================================
// TagInput component
// ============================================================
function TagInput({ tags, onChange, placeholder="タグを入力してEnter" }) {
  const [val, setVal] = useState('');
  const add = () => {
    const v = val.trim();
    if (v && !tags.includes(v)) onChange([...tags, v]);
    setVal('');
  };
  return (
    <div className="tag-input-area" onClick={e => e.currentTarget.querySelector('input').focus()}>
      {tags.map(t => (
        <span key={t} className="tag">
          {t}
          <span className="tag-remove" onClick={()=>onChange(tags.filter(x=>x!==t))}>×</span>
        </span>
      ))}
      <input
        value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();add();} }}
        onBlur={add}
        placeholder={tags.length===0?placeholder:''}
      />
    </div>
  );
}

// ============================================================
// Modal
// ============================================================
function Modal({ title, onClose, children, footer }) {
  useEffect(() => {
    const esc = e => { if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown', esc);
    return () => window.removeEventListener('keydown', esc);
  }, [onClose]);

  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, []);
  return (
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">{title}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

// ============================================================
// EventsPage
// ============================================================
function EventsPage({ state, dispatch, onSelect, onLayout, onAssign }) {
  const [showNew, setShowNew] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [form, setForm] = useState({ name: '', datetime: '' });
  const [editingEventId, setEditingEventId] = useState(null);

  const create = () => {
    if (!form.name.trim()) return;
    const id = uid();
    dispatch({ type:'ADD_EVENT', payload:{ id, name:form.name.trim(), datetime:form.datetime, createdAt:now(), updatedAt:now() }});
    setShowNew(false); setForm({name:'',datetime:''});
  };
  const del = (id, e) => {
    e.stopPropagation();
    if (confirm('このイベントを削除しますか？')) dispatch({type:'DELETE_EVENT', payload:id});
  };
  const openEdit = (ev, e) => {
    e.stopPropagation();
    setEditingEventId(ev.id);
    setForm({ name: ev.name || '', datetime: ev.datetime || '' });
    setShowEdit(true);
  };
  const saveEdit = () => {
    if (!form.name.trim() || !editingEventId) return;
    dispatch({
      type:'UPDATE_EVENT',
      payload:{ id: editingEventId, name: form.name.trim(), datetime: form.datetime }
    });
    setShowEdit(false);
    setEditingEventId(null);
    setForm({name:'',datetime:''});
  };
  const dup = (ev, e) => {
    e.stopPropagation();
    const newId = uid();
    dispatch({type:'DUPLICATE_EVENT', payload:{src:ev, newId}});
  };

  return (
    <div className="main">
      <div className="page-header">
        <div className="page-title">イベント一覧</div>
        <button className="btn btn-accent" onClick={()=>setShowNew(true)}>＋ 新規イベント</button>
      </div>
      {state.events.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state-icon">🎉</div>
          <div>まだイベントがありません</div>
          <div className="text-sm text-muted" style={{marginTop:'0.5rem'}}>「新規イベント」から作成してください</div>
        </div>
      ) : (
        <div className="events-grid">
          {state.events.map(ev => (
            <div key={ev.id} className="event-card" onClick={()=>onSelect(ev.id)}>
              <div className="event-card-title">{ev.name}</div>
              <div className="event-card-meta">
                {ev.datetime ? `📅 ${ev.datetime}` : '日時未設定'}
                <br/>更新: {fmtDate(ev.updatedAt)}
              </div>
              <div className="event-action-btns">
                <button className="btn-main layout" onClick={e=>{e.stopPropagation();onLayout(ev.id);}}>
                  <span className="btn-icon">🪑</span>会場・座席表
                </button>
                <button className="btn-main assign" onClick={e=>{e.stopPropagation();onAssign(ev.id);}}>
                  <span className="btn-icon">🎲</span>席割り
                </button>
              </div>
              <div className="event-sub-btns">
                <button className="btn btn-outline btn-sm event-sub-btn" onClick={e=>openEdit(ev,e)}><span>✏️</span><span>編集</span></button>
                <button className="btn btn-outline btn-sm event-sub-btn" onClick={e=>dup(ev,e)}><span>📄</span><span>複製</span></button>
                <button className="btn btn-danger btn-sm event-sub-btn" onClick={e=>del(ev.id,e)}><span>🗑️</span><span>削除</span></button>
              </div>
            </div>
          ))}
        </div>
      )}
      {showNew && (
        <Modal title="新規イベント" onClose={()=>setShowNew(false)}
          footer={<><button className="btn btn-outline" onClick={()=>setShowNew(false)}>キャンセル</button><button className="btn btn-accent" onClick={create}>作成</button></>}>
          <div><label>イベント名 *</label><input type="text" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="例: 2025年度Q2懇親会" autoFocus/></div>
          <div><label>日時（任意）</label><input type="datetime-local" value={form.datetime} onChange={e=>setForm(f=>({...f,datetime:e.target.value}))}/></div>
        </Modal>
      )}
      {showEdit && (
        <Modal title="イベント編集" onClose={()=>setShowEdit(false)}
          footer={<><button className="btn btn-outline" onClick={()=>setShowEdit(false)}>キャンセル</button><button className="btn btn-accent" onClick={saveEdit}>保存</button></>}>
          <div><label>イベント名 *</label><input type="text" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/></div>
          <div><label>日時（任意）</label><input type="datetime-local" value={form.datetime} onChange={e=>setForm(f=>({...f,datetime:e.target.value}))}/></div>
        </Modal>
      )}
    </div>
  );
}

// ============================================================
// ============================================================
// FloorTable – 丸/四角テーブル＋席レンダラー
// ============================================================
function FloorTable({ table, seats, assignments, attendees, violationSeatIds, selected, onSelect, onDragEnd }) {
  const CHAIR_COUNT = table.seatCount;
  const shape = table.shape || 'rect'; // 'round' | 'rect'

  // --- 丸テーブルのサイズ計算 ---
  const tableR    = Math.max(42, Math.min(80, 28 + CHAIR_COUNT * 4));
  const chairR    = Math.max(18, Math.min(28, tableR * 0.42));
  const orbitR    = tableR + chairR + 6;
  const roundSize = (orbitR + chairR) * 2 + 20;

  // --- 四角テーブルのサイズ・席配置計算 ---
  const rectChairW = 40;
  const rectChairH = 40;
  const rectGap    = 6;  // 椅子間隔
  const rectPad    = 14; // 天板内余白

  // N席を上下2辺のみに分散: 上=ceil(N/2)、下=残り
  const topCount    = Math.ceil(CHAIR_COUNT / 2);
  const bottomCount = CHAIR_COUNT - topCount;
  const dist = { top: topCount, right: 0, bottom: bottomCount, left: 0 };

  // 天板サイズ: 上下の最大席数でWを決定、H は固定
  const longestH   = Math.max(dist.top, dist.bottom);
  const rectTableW = Math.max(100, longestH * (rectChairW + rectGap) - rectGap + rectPad * 2);
  const rectTableH = 60;
  const canvasW    = rectTableW + 20;
  const canvasH    = rectTableH + (rectChairH + rectGap) * 2 + 20;
  const tLeft      = (canvasW - rectTableW) / 2;
  const tTop       = (canvasH - rectTableH) / 2;

  const startDrag = (e) => {
    e.preventDefault();
    const startX = e.clientX - (table.posX || 80);
    const startY = e.clientY - (table.posY || 80);
    const move = (me) => onDragEnd(table.id, Math.max(20, me.clientX - startX), Math.max(20, me.clientY - startY));
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  // 椅子の色クラス取得
  const chairCls = (seat) => {
    if (violationSeatIds.has(seat.id)) return 'violation';
    if (assignments[seat.id]) return 'occupied';
    return 'empty';
  };
  const chairLabel = (seat) => {
    const aId = assignments[seat.id];
    const att = aId ? attendees.find(a=>a.id===aId) : null;
    return att
      ? <span className="floor-chair-name">{att.name.length > 4 ? att.name.slice(0,4) : att.name}</span>
      : <span className="floor-chair-id">{seat.index}</span>;
  };

  // ── 四角テーブル席配置: 4辺に均等配置、各辺センタリング ──
  const buildRectChairs = () => {
    const placed = [];
    let idx = 0;

    // 1辺ぶんの椅子を座標付きで追加するヘルパー
    const placeEdge = (count, getPos) => {
      for (let i = 0; i < count && idx < seats.length; i++, idx++) {
        placed.push({ ...getPos(i, count), seat: seats[idx] });
      }
    };

    // 辺ごとの総幅を計算してセンタリングするユーティリティ
    const edgeW = (n) => n * (rectChairW + rectGap) - rectGap; // 横方向
    const edgeH = (n) => n * (rectChairH + rectGap) - rectGap; // 縦方向

    // 上辺（左→右）
    placeEdge(dist.top, (i, n) => ({
      x: tLeft + (rectTableW - edgeW(n)) / 2 + i * (rectChairW + rectGap),
      y: tTop - rectChairH - rectGap,
    }));
    // 右辺（上→下）
    placeEdge(dist.right, (i, n) => ({
      x: tLeft + rectTableW + rectGap,
      y: tTop + (rectTableH - edgeH(n)) / 2 + i * (rectChairH + rectGap),
    }));
    // 下辺（右→左、向き合うよう逆順）
    placeEdge(dist.bottom, (i, n) => ({
      x: tLeft + (rectTableW - edgeW(n)) / 2 + (n - 1 - i) * (rectChairW + rectGap),
      y: tTop + rectTableH + rectGap,
    }));
    // 左辺（下→上、向き合うよう逆順）
    placeEdge(dist.left, (i, n) => ({
      x: tLeft - rectChairW - rectGap,
      y: tTop + (rectTableH - edgeH(n)) / 2 + (n - 1 - i) * (rectChairH + rectGap),
    }));

    return placed;
  };

  if (shape === 'round') {
    // ── 丸テーブル ──
    const cx = roundSize / 2, cy = roundSize / 2;
    return (
      <div className={`floor-table-group ${selected?'selected':''}`}
        style={{ left: table.posX||80, top: table.posY||80, position:'absolute' }}
        onMouseDown={e => { if(e.button===0){ onSelect(table.id); startDrag(e); } }}>
        <div className="floor-table-label">{table.name}</div>
        <div style={{ position:'relative', width: roundSize, height: roundSize }}>
          <div className="floor-table-top" style={{
            width:tableR*2, height:tableR*2, borderRadius:'50%',
            position:'absolute', left:cx-tableR, top:cy-tableR, pointerEvents:'none',
          }}/>
          {seats.map((seat, i) => {
            const angle = (2*Math.PI*i/CHAIR_COUNT) - Math.PI/2;
            const cx2 = cx + orbitR * Math.cos(angle);
            const cy2 = cy + orbitR * Math.sin(angle);
            return (
              <div key={seat.id} className={`floor-chair ${chairCls(seat)}`}
                style={{ width:chairR*2, height:chairR*2, left:cx2-chairR, top:cy2-chairR,
                  fontSize: chairR<22?'0.5rem':'0.58rem', borderRadius:'50%' }}
                title={assignments[seat.id] ? attendees.find(a=>a.id===assignments[seat.id])?.name : seat.id}
                onMouseDown={e=>e.stopPropagation()}>
                {chairLabel(seat)}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── 四角テーブル ──
  const rectChairs = buildRectChairs();
  return (
    <div className={`floor-table-group ${selected?'selected':''}`}
      style={{ left: table.posX||80, top: table.posY||80, position:'absolute' }}
      onMouseDown={e => { if(e.button===0){ onSelect(table.id); startDrag(e); } }}>
      <div className="floor-table-label">{table.name}</div>
      <div style={{ position:'relative', width: canvasW, height: canvasH }}>
        {/* 天板(四角) */}
        <div style={{
          position:'absolute', left:tLeft, top:tTop, width:rectTableW, height:rectTableH,
          background:'linear-gradient(145deg, #9a6e3a 0%, #6b4226 50%, #3d2210 100%)',
          borderRadius: 10,
          boxShadow:'0 6px 24px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.12)',
          border:'2px solid rgba(255,255,255,0.1)',
          pointerEvents:'none',
        }}>
          {/* 木目 */}
          <div style={{position:'absolute',inset:8,borderRadius:5,border:'1px solid rgba(255,255,255,0.05)',boxShadow:'0 0 0 4px rgba(255,255,255,0.02)'}}/>
        </div>
        {/* 椅子(四角) */}
        {rectChairs.map(({ x, y, seat }) => (
          <div key={seat.id} className={`floor-chair ${chairCls(seat)}`}
            style={{
              width:rectChairW, height:rectChairH,
              left:x, top:y,
              borderRadius: 6,   // 四角椅子は角丸控えめ
              fontSize:'0.58rem',
            }}
            title={assignments[seat.id] ? attendees.find(a=>a.id===assignments[seat.id])?.name : seat.id}
            onMouseDown={e=>e.stopPropagation()}>
            {chairLabel(seat)}
          </div>
        ))}
      </div>
    </div>
  );
}
// ============================================================
// AssignFloorTable – 席割り画面用インタラクティブテーブル
// ============================================================
function AssignFloorTable({ table, seats, assignments, attendees, violationSeatIds,
  selectedId, hasViolation, tableViolations, flagHighlightIds, lockedAttendees,
  onSeatClick, onUnassign }) {

  const N = seats.length;
  const shape = table.shape || 'rect';

  // 丸テーブル
  const tR = Math.max(42, Math.min(80, 28 + N * 4));
  const cR = Math.max(20, Math.min(30, tR * 0.45));
  const oR = tR + cR + 8;
  const roundSz = (oR + cR) * 2 + 20;

  // 四角テーブル
  const cW = 48, cH = 48, cGap = 8, tPad = 16;
  const topN = Math.ceil(N / 2), botN = N - topN;
  const tW = Math.max(120, Math.max(topN, botN) * (cW + cGap) - cGap + tPad * 2);
  const tH = 70;
  const cvW = tW + 20, cvH = tH + (cH + cGap) * 2 + 20;
  const tL = (cvW - tW) / 2, tTop2 = (cvH - tH) / 2;

  const seatColor = (seat) => {
    const aId = assignments[seat.id];
    const isLocked = !!(aId && lockedAttendees && lockedAttendees[aId]);
    const isHL  = flagHighlightIds && aId && flagHighlightIds.has(aId);
    const isDim = flagHighlightIds && flagHighlightIds.size > 0 && aId && !flagHighlightIds.has(aId);
    if (isLocked)
      return { bg:'#d9d9d9', br:'#8a8a8a', co:'#111', op:1, sh:'0 0 0 2px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.35)' };
    if (violationSeatIds.has(seat.id))
      return { bg:'radial-gradient(circle at 40% 35%,#a04040,#6b1515)', br:'rgba(220,100,100,0.6)', co:'#ffd0d0', op:1, sh:'0 2px 8px rgba(0,0,0,0.5)' };
    if (isHL)
      return { bg:'radial-gradient(circle at 40% 35%,#b8860b,#7a5800)', br:'rgba(255,220,60,0.9)', co:'#fff8c0', op:1, sh:'0 0 0 3px rgba(255,220,60,0.45),0 2px 8px rgba(0,0,0,0.5)' };
    if (aId)
      return { bg:'radial-gradient(circle at 40% 35%,#5a8a6a,#2d5a3d)', br:'rgba(120,200,140,0.4)', co:'#d0f0dc', op: isDim ? 0.25 : 1, sh:'0 2px 8px rgba(0,0,0,0.5)' };
    if (selectedId)
      return { bg:'radial-gradient(circle at 40% 35%,#3a5068,#1a3048)', br:'rgba(100,180,255,0.5)', co:'#c0e0ff', op:1, sh:'0 2px 8px rgba(0,0,0,0.5)' };
    return { bg:'radial-gradient(circle at 40% 35%,#4a4550,#2a2730)', br:'rgba(255,255,255,0.1)', co:'rgba(255,255,255,0.2)', op:1, sh:'0 2px 8px rgba(0,0,0,0.5)' };
  };

  const ChairEl = ({ seat, w, h, posStyle, radius }) => {
    const aId = assignments[seat.id];
    const att = aId ? attendees.find(a => a.id === aId) : null;
    const sc  = seatColor(seat);
    return (
      <div
        onClick={() => onSeatClick(seat.id)}
        title={att ? att.name : seat.id}
        style={{
          position:'absolute', ...posStyle,
          width: w, height: h,
          borderRadius: radius !== undefined ? radius : '50%',
          background: sc.bg,
          border: `2px solid ${sc.br}`,
          boxShadow: sc.sh,
          color: sc.co,
          opacity: sc.op,
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          cursor: 'pointer',
          fontSize: w > 42 ? '0.65rem' : '0.55rem',
          fontWeight: 600, textAlign:'center',
          transition:'transform 0.12s, opacity 0.2s, box-shadow 0.2s',
          userSelect:'none', overflow:'hidden', padding: 2, lineHeight: 1.2,
          animation: violationSeatIds.has(seat.id) ? 'pulseRed 1.5s ease-in-out infinite' : 'none',
        }}
        onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.12)'; }}
        onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
      >
        <span style={{pointerEvents:'none'}}>{att ? att.name.slice(0,4) : seat.index}</span>
        {att && lockedAttendees && lockedAttendees[aId] && <span style={{position:'absolute',left:3,top:2,fontSize:'0.52rem',pointerEvents:'none'}}>🔒</span>}
        {att && (
          <button onClick={e => onUnassign(seat.id, e)}
            style={{position:'absolute',top:1,right:2,background:'none',border:'none',
              cursor:'pointer',fontSize:'0.6rem',color:'rgba(255,200,200,0.7)',lineHeight:1,padding:0}}>x</button>
        )}
      </div>
    );
  };

  const rectPos = () => {
    const out = []; let idx = 0;
    const ew = n => n * (cW + cGap) - cGap;
    for (let i = 0; i < topN && idx < seats.length; i++, idx++)
      out.push({ x: tL + (tW - ew(topN)) / 2 + i * (cW + cGap), y: tTop2 - cH - cGap, seat: seats[idx] });
    for (let i = botN-1; i >= 0 && idx < seats.length; i--, idx++)
      out.push({ x: tL + (tW - ew(botN)) / 2 + i * (cW + cGap), y: tTop2 + tH + cGap, seat: seats[idx] });
    return out;
  };

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{
        color: hasViolation ? '#ff8080' : 'rgba(255,255,255,0.75)',
        fontSize:'0.78rem', fontWeight:700, letterSpacing:'0.06em',
        fontFamily:"'Noto Serif JP',serif",
        background:'rgba(0,0,0,0.45)', padding:'3px 14px', borderRadius:10, marginBottom:8,
      }}>
        {hasViolation ? '⚠️ ' : ''}{table.name}
        <span style={{marginLeft:8,fontSize:'0.65rem',opacity:0.7}}>
          {seats.filter(s => assignments[s.id]).length}/{N}席
        </span>
      </div>
      {hasViolation && (
        <div style={{background:'rgba(192,57,43,0.75)',color:'#ffe0e0',fontSize:'0.67rem',
          padding:'3px 10px',borderRadius:8,marginBottom:6,maxWidth:280,textAlign:'center'}}>
          {tableViolations.map((v,i) => <span key={i}>NG: {v.aName}x{v.bName} </span>)}
        </div>
      )}
      {shape === 'round' ? (
        <div style={{position:'relative',width:roundSz,height:roundSz}}>
          <div style={{
            position:'absolute',left:roundSz/2-tR,top:roundSz/2-tR,
            width:tR*2,height:tR*2,borderRadius:'50%',
            background:'radial-gradient(circle at 38% 35%,#a0734a,#6b4226 60%,#3d2210)',
            boxShadow:'0 6px 24px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.15)',
            border:'2px solid rgba(255,255,255,0.1)',pointerEvents:'none',
          }}/>
          {seats.map((seat,i) => {
            const ang = (2*Math.PI*i/N) - Math.PI/2;
            const cx = roundSz/2 + oR*Math.cos(ang), cy = roundSz/2 + oR*Math.sin(ang);
            return <ChairEl key={seat.id} seat={seat} w={cR*2} h={cR*2} posStyle={{left:cx-cR,top:cy-cR}} />;
          })}
        </div>
      ) : (
        <div style={{position:'relative',width:cvW,height:cvH}}>
          <div style={{
            position:'absolute',left:tL,top:tTop2,width:tW,height:tH,
            background:'linear-gradient(145deg,#9a6e3a 0%,#6b4226 50%,#3d2210 100%)',
            borderRadius:12,
            boxShadow:'0 6px 24px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.12)',
            border:'2px solid rgba(255,255,255,0.1)',pointerEvents:'none',
          }}>
            <div style={{position:'absolute',inset:10,borderRadius:6,border:'1px solid rgba(255,255,255,0.05)'}}/>
          </div>
          {rectPos().map(({x,y,seat}) =>
            <ChairEl key={seat.id} seat={seat} w={cW} h={cH} posStyle={{left:x,top:y}} radius={8} />
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// AssignPage
// ============================================================
function AssignPage({ event, dispatch, notify }) {
  const tables      = event.tables || [];
  const attendees   = event.attendees || [];
  const ngPairs     = event.ngPairs || [];
  const assignments = event.assignments || {};
  const lockedAttendees = event.lockedAttendees || {};

  const [selected,  setSelected]  = useState(null);
  const [filterTag, setFilterTag] = useState('');
  const [search,    setSearch]    = useState('');
  const [customRuleModalOpen, setCustomRuleModalOpen] = useState(false);
  const [customRuleDraft, setCustomRuleDraft] = useState(event.customRule || 'disperse');
  const [customGatherFlagsDraft, setCustomGatherFlagsDraft] = useState((event.customGatherFlags || []).slice(0,4));
  const [customRulesDraft, setCustomRulesDraft] = useState(normalizeFlagRules(event.customRules, event.customRule, event.customGatherFlags));
  const [customRulesError, setCustomRulesError] = useState('');
  const [ruleConflictFlag, setRuleConflictFlag] = useState('');
  const [ruleConflictBanner, setRuleConflictBanner] = useState('');
  const [activeRuleTooltip, setActiveRuleTooltip] = useState('');

  useEffect(() => {
    setCustomRuleDraft(event.customRule || 'disperse');
    setCustomGatherFlagsDraft((event.customGatherFlags || []).slice(0,4));
    setCustomRulesDraft(normalizeFlagRules(event.customRules, event.customRule, event.customGatherFlags));
    setCustomRulesError('');
    setRuleConflictFlag('');
    setRuleConflictBanner('');
    setActiveRuleTooltip('');
  }, [event.customRule, event.customGatherFlags, event.customRules]);

  useEffect(() => {
    if (!activeRuleTooltip) return;
    const closeTooltip = () => setActiveRuleTooltip('');
    document.addEventListener('click', closeTooltip);
    return () => document.removeEventListener('click', closeTooltip);
  }, [activeRuleTooltip]);

  const seats       = useMemo(() => generateSeats(tables.map(t => ({...t,eventId:event.id}))), [tables,event.id]);
  const totalSeats  = seats.length;
  const assignedCount = Object.values(assignments).filter(Boolean).length;
  const assignedIds = new Set(Object.values(assignments).filter(Boolean));
  const unassigned  = attendees.filter(a => !assignedIds.has(a.id));
  const allTags     = [...new Set(attendees.flatMap(a => a.flags))];

  const violations        = useMemo(() => checkViolations(tables,seats,assignments,ngPairs,attendees), [tables,seats,assignments,ngPairs,attendees]);
  const violationTableIds = new Set(violations.map(v => v.tableId));
  const violationSeatIds  = useMemo(() => {
    const s = new Set();
    violations.forEach(v => seats.forEach(seat => {
      if (seat.tableId===v.tableId && (assignments[seat.id]===v.a || assignments[seat.id]===v.b)) s.add(seat.id);
    }));
    return s;
  }, [violations,seats,assignments]);

  // フラグハイライト
  const flagHighlightIds = useMemo(() => {
    if (!filterTag) return null;
    return new Set(attendees.filter(a => a.flags.includes(filterTag)).map(a => a.id));
  }, [filterTag, attendees]);

  const handleSeatClick = (seatId) => {
    const cur = assignments[seatId];
    if (selected) {
      const prevSeat = Object.keys(assignments).find(s => assignments[s] === selected);
      const targetLocked = cur ? !!lockedAttendees[cur] : false;
      const selectedLocked = !!lockedAttendees[selected];
      if (targetLocked && cur !== selected) {
        notify('🔒 ロック中の参加者は移動できません','warning');
        return;
      }
      if (selectedLocked && prevSeat && prevSeat !== seatId) {
        notify('🔒 ロック中の参加者は別席へ移動できません','warning');
        return;
      }
      const updates = { [seatId]: selected };
      if (prevSeat && prevSeat !== seatId) updates[prevSeat] = cur || null;
      dispatch({type:'BATCH_ASSIGN', eventId:event.id, updates});
      setSelected(null);
    } else if (cur) {
      setSelected(cur);
    }
  };

  const unassignSeat = (seatId, e) => {
    e.stopPropagation();
    const cur = assignments[seatId];
    if (cur && lockedAttendees[cur]) {
      notify('🔒 ロック中の参加者は解除できません','warning');
      return;
    }
    dispatch({type:'ASSIGN', eventId:event.id, seatId, attendeeId:null});
    if (selected && assignments[seatId] === selected) setSelected(null);
  };

  const randomAssign = () => {
    const allSeats  = seats.map(s => s.id);
    const lockedIds = new Set(Object.keys(lockedAttendees).filter(id => lockedAttendees[id]));
    const lockedSeatByAttendee = {};
    Object.entries(assignments).forEach(([sid,aid])=>{ if (aid && lockedIds.has(aid)) lockedSeatByAttendee[aid] = sid; });
    if (Object.keys(lockedSeatByAttendee).length !== lockedIds.size) {
      notify('🔒 ロック中の参加者は先に座席へ配置してください','warning');
      return;
    }
    const allPeople = attendees.filter(a => !lockedIds.has(a.id));
    const ngSet = new Set(ngPairs.map(p => `${[p.a,p.b].sort().join('|')}`));
    const isNG  = (a,b) => ngSet.has(`${[a,b].sort().join('|')}`);
    const seatTable  = {}; seats.forEach(s => { seatTable[s.id] = s.tableId; });
    const tableSeats = {}; tables.forEach(t => { tableSeats[t.id] = seats.filter(s => s.tableId===t.id).map(s => s.id); });
    const TRIALS = 150; let best = null, bestScore = -Infinity;
    for (let t = 0; t < TRIALS; t++) {
      const ppl = [...allPeople];
      for (let i = ppl.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [ppl[i],ppl[j]]=[ppl[j],ppl[i]]; }
      const assign = {...Object.fromEntries(Object.entries(lockedSeatByAttendee).map(([aid,sid])=>[sid,aid]))}; let failed = false;
      for (const person of ppl) {
        const eligible = allSeats.filter(sid => {
          if (assign[sid]) return false;
          const mates = (tableSeats[seatTable[sid]]||[]).filter(s=>assign[s]).map(s=>assign[s]);
          return !mates.some(m => isNG(m, person.id));
        });
        if (!eligible.length) { failed = true; break; }
        assign[eligible[Math.floor(Math.random()*eligible.length)]] = person.id;
      }
      if (failed) continue;
      let score = Math.random() * 0.5;
      tables.forEach(tab => {
        const tp = (tableSeats[tab.id]||[]).map(s=>assign[s]).filter(Boolean).map(id=>allPeople.find(p=>p.id===id)).filter(Boolean);
        const fc = {}; tp.forEach(p=>p.flags.forEach(f=>{fc[f]=(fc[f]||0)+1;}));
        Object.values(fc).forEach(c=>{score-=(c-1);});
      });
      if (score > bestScore) { bestScore=score; best=assign; }
    }
    if (!best) {
      const ppl = [...allPeople];
      for (let i=ppl.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ppl[i],ppl[j]]=[ppl[j],ppl[i]];}
      best = {};
      ppl.forEach((p,i)=>{ if(allSeats[i]) best[allSeats[i]]=p.id; });
      notify('NG制約を完全に満たす配置が見つからず、近似配置にしました','warning');
    } else {
      notify('🎲 ランダム配置しました（NG考慮）');
    }
    const updates = {};
    allSeats.forEach(sid => { updates[sid] = best[sid] || null; });

      const seatTargets = ppl.slice(0, availableSeatCount);
