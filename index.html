    notify('卓を複製しました');
  };
  const updateTable = (tid, key, val) => dispatch({type:'UPDATE_TABLE', eventId:event.id, tableId:tid, key, val});
  const commitTableSeatCount = (tableId, fallbackSeatCount) => {
    const raw = editingSeatCounts[tableId];
    if (raw === undefined) return;
    const parsed = parseInt(raw, 10);
    const nextSeatCount = Number.isFinite(parsed) ? Math.max(1, Math.min(30, parsed)) : Math.max(1, fallbackSeatCount || 1);
    updateTable(tableId, 'seatCount', nextSeatCount);
    setEditingSeatCounts(prev => {
      const next = { ...prev };
      delete next[tableId];
      return next;
    });
  };
  const commitNewTableSeatCount = () => {
    const parsed = parseInt(newTableSeatCountInput, 10);
    const nextSeatCount = Number.isFinite(parsed) ? Math.max(1, Math.min(30, parsed)) : 6;
    setNewTable(f => ({ ...f, seatCount: nextSeatCount }));
    setNewTableSeatCountInput(String(nextSeatCount));
  };
  const handleDragPos = useCallback((tid, x, y) => {
    dispatch({type:'MOVE_TABLE_POS', eventId:event.id, tableId:tid, posX:x, posY:y});
  }, [event.id, dispatch]);

  const totalSeats = tables.reduce((s,t)=>s+t.seatCount,0);
  const assignedCount = Object.values(assignments).filter(Boolean).length;
  const floorDesign = event.floorDesign || 'default';
  const [isMobileLayout, setIsMobileLayout] = useState(() => window.innerWidth <= 720);
  const [isCompactPc, setIsCompactPc] = useState(() => window.innerWidth <= 1200 || window.innerHeight <= 820);
  useEffect(() => {
    const onResize = () => {
      setIsMobileLayout(window.innerWidth <= 720);
      setIsCompactPc(window.innerWidth <= 1200 || window.innerHeight <= 820);
    };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const effectiveFloorDesign = isMobileLayout ? 'default' : floorDesign;
  const floorCanvasRef = useRef(null);

  const addObject = (type) => {
    const base = type === 'stage' ? { icon:'🎤', label:'ステージ' } : { icon:'🚪', label:'出入口' };
    setFloorObjects(prev => ([...prev, { id: uid(), type, ...base, x: 80 + prev.length * 26, y: 70 + prev.length * 20 }]));
  };
  const moveObject = (id, x, y) => setFloorObjects(prev => prev.map(o => o.id===id ? { ...o, x: Math.max(0,x), y: Math.max(0,y) } : o));

  const startObjectDrag = (obj, e) => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX - (obj.x || 0);
    const startY = e.clientY - (obj.y || 0);
    const move = (me) => moveObject(obj.id, me.clientX - startX, me.clientY - startY);
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  const handlePdfDownload = async () => {
    if (isMobileLayout) return;
    try {
      localStorage.setItem(PDF_SETTINGS_KEY, JSON.stringify(pdfSettings));
      await downloadFloorPdf({ element: floorCanvasRef.current, eventName: event.name, settings: pdfSettings, floorObjects });
      setShowPdfModal(false);
      notify('PDFをダウンロードしました');
    } catch (e) {
      notify('PDFの作成に失敗しました', 'error');
    }
  };

  return (
    <div className="floor-layout-shell">
      <div className="floor-toolbar">
        <div className="floor-toolbar-stats">
          {[
            {label:`卓数: ${tables.length}`, c:'rgba(255,255,255,0.75)'},
            {label:`総席: ${totalSeats}`, c:'rgba(255,255,255,0.75)'},
            {label:`割当: ${assignedCount}/${totalSeats}`, c:'#6dcea0'},
            violations.length>0 && {label:`NG違反: ${violations.length}件`, c:'#f08080'},
          ].filter(Boolean).map((p,i)=>(<span key={i} className="stat-chip" style={{color:p.c}}>{p.label}</span>))}
        </div>
        <div className="floor-toolbar-actions">
          {!isMobileLayout && (
            <>
              {isCompactPc && (
                <button className="floor-panel-toggle" onClick={()=>setPanelCollapsed(v=>!v)}>{panelCollapsed?'卓一覧を表示':'卓一覧を隠す'}</button>
              )}
              <select value={floorDesign} onChange={e=>dispatch({type:'UPDATE_EVENT_FIELD', eventId:event.id, key:'floorDesign', val:e.target.value})} style={{width:'170px'}}>
                <option value="default">デフォルト</option>
                <option value="simple">シンプル</option>
                <option value="cute">かわいい</option>
                <option value="stylish">スタイリッシュ</option>
              </select>
              <button className="btn btn-outline btn-sm" onClick={()=>setShowPdfModal(true)}>PDF</button>
            </>
          )}
          <button className="btn btn-accent btn-sm" onClick={()=>setShowAdd(true)}>＋ 卓を追加</button>
        </div>
      </div>

      <div className={`floor-layout theme-${effectiveFloorDesign} ${panelCollapsed && isCompactPc ? 'panel-collapsed' : ''}`}>
        <div className="floor-canvas-region">
          <div className="floor-canvas-wrap" style={{position:'relative'}}>
            <div className="floor-canvas" ref={floorCanvasRef} onClick={()=>setSelectedId(null)}>
              {tables.length===0 && (<div className="floor-empty"><div className="floor-empty-icon">🍺</div><div className="floor-empty-text">「＋ 卓を追加」から<br/>テーブルを配置しましょう</div></div>)}
              {tables.map(t => {
                const tableSeats = seats.filter(s=>s.tableId===t.id);
                return <FloorTable key={t.id} table={t} seats={tableSeats} assignments={assignments} attendees={attendees} violationSeatIds={violationSeatIds} selected={selectedId===t.id} onSelect={setSelectedId} onDragEnd={handleDragPos}/>;
              })}
              {floorObjects.map(obj => (
                <div key={obj.id} className="floor-object" style={{left:obj.x, top:obj.y}} onMouseDown={e=>startObjectDrag(obj,e)}>
                  <span>{obj.icon} {obj.label}</span>
                  <button onClick={e=>{e.stopPropagation(); setFloorObjects(prev=>prev.filter(x=>x.id!==obj.id));}}>×</button>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className={`floor-panel ${panelCollapsed && isCompactPc ? 'hidden' : ''}`}>
          <div className="floor-panel-header">
            <div style={{fontFamily:"'Noto Serif JP',serif",fontWeight:700,fontSize:'0.9rem',color:'var(--ink)',marginBottom:'0.5rem'}}>卓一覧</div>
            <button className="btn btn-accent btn-sm w-full" onClick={()=>setShowAdd(true)}>＋ 卓を追加</button>
          </div>
          <div className="floor-panel-body">
            {tables.length===0 && <div className="text-sm text-muted" style={{textAlign:'center',padding:'1rem 0'}}>卓がありません</div>}
            {tables.map((t) => {
              const tSeats = seats.filter(s=>s.tableId===t.id);
              const occCount = tSeats.filter(s=>assignments[s.id]).length;
              const hasViol = violations.some(v=>v.tableId===t.id);
              const isActive = selectedId===t.id;
              return (
                <div key={t.id} className={`floor-table-item ${isActive?'active':''}`} onClick={()=>setSelectedId(t.id)}>
                  <div className="floor-table-item-head"><span className="floor-table-item-name">{hasViol?'⚠️ ':''}{t.name}</span><span style={{fontSize:'0.72rem',color:'var(--ink-light)'}}>{occCount}/{t.seatCount}席</span></div>
                  <div className="floor-seat-bar">{tSeats.map(s => { const viol = violationSeatIds.has(s.id); const occ = !!assignments[s.id]; return <div key={s.id} className={`floor-seat-dot ${viol?'viol':occ?'occ':''}`}/>; })}</div>
                  {isActive && (
                    <div onClick={e=>e.stopPropagation()}>
                      <div className="floor-edit-row" style={{marginTop:'0.6rem'}}><label>卓名</label><input type="text" value={t.name} onChange={e=>updateTable(t.id,'name',e.target.value)} style={{flex:1}}/></div>
                      <div className="floor-edit-row"><label>座席数</label><input type="number" min="1" max="30" value={editingSeatCounts[t.id] ?? String(t.seatCount)} onFocus={e=>e.target.select()} onChange={e=>setEditingSeatCounts(prev=>({...prev,[t.id]:e.target.value}))} onBlur={()=>commitTableSeatCount(t.id,t.seatCount)} onKeyDown={e=>{ if (e.key==='Enter') { commitTableSeatCount(t.id,t.seatCount); e.target.blur(); } }} style={{width:60}}/></div>
                      <div className="floor-edit-row"><label>形状</label><div style={{display:'flex',gap:'0.4rem',flex:1}}>{[{v:'rect',icon:'⬛',label:'四角'},{v:'round',icon:'🔵',label:'丸'}].map(s=>(<button key={s.v} className={`btn btn-sm ${(t.shape||'rect')===s.v?'btn-primary':'btn-outline'}`} style={{flex:1,gap:'0.25rem'}} onClick={()=>updateTable(t.id,'shape',s.v)}>{s.icon} {s.label}</button>))}</div></div>
                      {hasViol && <div style={{marginTop:'0.5rem',fontSize:'0.73rem',color:'var(--accent)',background:'#fde8e8',borderRadius:5,padding:'0.3rem 0.5rem'}}>{violations.filter(v=>v.tableId===t.id).map((v,i)=><div key={i}>NG: {v.aName} × {v.bName}</div>)}</div>}
                      <button className="btn btn-outline btn-sm w-full" style={{marginTop:'0.6rem'}} onClick={()=>duplicateTable(t)}>この卓を複製</button>
                      <button className="btn btn-danger btn-sm w-full" style={{marginTop:'0.6rem'}} onClick={()=>delTable(t.id)}>この卓を削除</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {showAdd && (
        <Modal title="卓を追加" onClose={()=>setShowAdd(false)} footer={<><button className="btn btn-outline" onClick={()=>setShowAdd(false)}>キャンセル</button><button className="btn btn-accent" onClick={addTable}>追加</button></>}>
          <div><label>卓名（省略時: 自動採番）</label><input type="text" value={newTable.name} onChange={e=>setNewTable(f=>({...f,name:e.target.value}))} placeholder={`T${tables.length+1}`} autoFocus/></div>
          <div><label>座席数</label><input type="number" min="1" max="30" value={newTableSeatCountInput} onFocus={e=>e.target.select()} onChange={e=>setNewTableSeatCountInput(e.target.value)} onBlur={commitNewTableSeatCount} onKeyDown={e=>{ if (e.key==='Enter') { commitNewTableSeatCount(); e.target.blur(); } }}/></div>
          <div><label>テーブル形状</label><div style={{display:'flex',gap:'0.75rem',marginTop:'0.25rem'}}>{[{v:'rect',icon:'⬛',label:'四角（デフォルト）'},{v:'round',icon:'🔵',label:'丸'}].map(s=>(<button key={s.v} className={`btn ${newTable.shape===s.v?'btn-primary':'btn-outline'}`} style={{flex:1,flexDirection:'column',gap:'0.3rem',padding:'0.75rem 0.5rem',fontSize:'0.82rem'}} onClick={()=>setNewTable(f=>({...f,shape:s.v}))}><span style={{fontSize:'1.5rem'}}>{s.icon}</span>{s.label}</button>))}</div></div>
        </Modal>
      )}

      {showPdfModal && (
        <Modal title="PDF生成" onClose={()=>setShowPdfModal(false)} footer={<><button className="btn btn-outline" onClick={()=>setShowPdfModal(false)}>キャンセル</button><button className="btn btn-accent" onClick={handlePdfDownload}>PDF生成</button></>}>
          <div className="pdf-setting-grid">
            <div><label>用紙向き</label><select value={pdfSettings.orientation} onChange={e=>setPdfSettings(v=>({...v, orientation:e.target.value}))}><option value="portrait">縦</option><option value="landscape">横</option></select></div>
            <div><label>フィット方式</label><select value={pdfSettings.fitMode} onChange={e=>setPdfSettings(v=>({...v, fitMode:e.target.value}))}><option value="cover">余白ゼロで全面（cover）</option><option value="contain">全体表示（contain）</option></select></div>
            <div><label>ロゴ表示</label><select value={pdfSettings.showLogo ? 'on' : 'off'} onChange={e=>setPdfSettings(v=>({...v, showLogo:e.target.value==='on'}))}><option value="on">ON</option><option value="off">OFF</option></select></div>
            <div><label>ロゴサイズ</label><select value={pdfSettings.logoSize} onChange={e=>setPdfSettings(v=>({...v, logoSize:e.target.value}))}><option value="small">小</option><option value="medium">中</option><option value="large">大</option></select></div>
          </div>
          <div><label>余白(mm)</label><input type="number" min="0" max="20" step="1" value={pdfSettings.marginMm} onChange={e=>setPdfSettings(v=>({...v, marginMm: parseInt(e.target.value,10) || 0}))}/></div>
          <div><label>出入口/ステージ配置</label><div className="pdf-object-toolbar"><button className="btn btn-outline btn-sm" onClick={()=>addObject('entrance')}>＋ 出入口</button><button className="btn btn-outline btn-sm" onClick={()=>addObject('stage')}>＋ ステージ</button></div></div>
          <div className="text-sm text-muted">アイテムは会場上でドラッグ移動できます。配置は保持されます。</div>
        </Modal>
      )}
    </div>
  );
}

// ============================================================
// AttendeesPage
// ============================================================
function AttendeesPage({ event, dispatch, notify }) {
  const attendees = event.attendees || [];
  const ngPairs = event.ngPairs || [];
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null); // null | 'add' | 'edit' | 'ng'
  const [editTarget, setEditTarget] = useState(null);
  const [form, setForm] = useState({ name:'', flags:[], note:'' });
  const [ngTarget, setNgTarget] = useState(null);
  const [ngSearch, setNgSearch] = useState('');

  const openAdd = () => { setForm({name:'',flags:[],note:''}); setModal('add'); };
  const openEdit = (a) => { setEditTarget(a); setForm({name:a.name, flags:[...a.flags], note:a.note||''}); setModal('edit'); };
  const openNG = (a) => { setNgTarget(a); setNgSearch(''); setModal('ng'); };

  const save = () => {
    if (!form.name.trim()) return;
    if (modal === 'add') {
      dispatch({type:'ADD_ATTENDEE', eventId:event.id, payload:{id:uid(), eventId:event.id, name:form.name.trim(), flags:form.flags, note:form.note}});
      notify('参加者を追加しました');
    } else {
      dispatch({type:'UPDATE_ATTENDEE', eventId:event.id, id:editTarget.id, payload:{name:form.name.trim(), flags:form.flags, note:form.note}});
      notify('更新しました');
    }
    setModal(null);
  };
  const del = (id) => {
    if (confirm('この参加者を削除しますか？')) {
      dispatch({type:'DEL_ATTENDEE', eventId:event.id, id});
      notify('削除しました');
    }
  };

  const addNG = (bId) => {
    if (ngTarget.id === bId) return;
    const exists = ngPairs.some(p => (p.a===ngTarget.id&&p.b===bId)||(p.a===bId&&p.b===ngTarget.id));
    if (!exists) {
      const [a,b] = [ngTarget.id, bId].sort();
      dispatch({type:'ADD_NG', eventId:event.id, payload:{id:uid(), a, b}});
      notify('NGペアを登録しました');
    }
  };
  const delNG = (id) => dispatch({type:'DEL_NG', eventId:event.id, id});

  const getNGsFor = (aId) => ngPairs
    .filter(p=>p.a===aId||p.b===aId)
    .map(p=>({ id:p.id, otherId: p.a===aId?p.b:p.a }));

  const filtered = attendees.filter(a=>a.name.includes(search));
  const ngTargetNGs = ngTarget ? getNGsFor(ngTarget.id) : [];
  const ngCandidates = ngTarget ? attendees.filter(a=>a.id!==ngTarget.id&&a.name.includes(ngSearch)) : [];

  // CSV export
  const exportCSV = () => {
    const rows = [['name','flags','note'],...attendees.map(a=>[a.name, a.flags.join('|'), a.note||''])];
    const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`theseki_attendees_${event.id}.csv`; a.click();
    URL.revokeObjectURL(url);
    notify('CSVをエクスポートしました');
  };

  // CSV import
  const importCSV = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result.replace(/^\uFEFF/,'');
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
      let added = 0;
      lines.slice(1).forEach(line => {
        const cols = line.match(/("(?:[^"]|"")*"|[^,]*),?/g)?.map(c=>c.replace(/,$/, '').replace(/^"|"$/g,'').replace(/""/g,'"').trim()) || [];
        const name = cols[headers.indexOf('name')] || '';
        if (!name) return;
        const flagsRaw = cols[headers.indexOf('flags')] || '';
        const flags = flagsRaw ? flagsRaw.split('|').map(f=>f.trim()).filter(Boolean) : [];
        const note = cols[headers.indexOf('note')] || '';
        dispatch({type:'ADD_ATTENDEE', eventId:event.id, payload:{id:uid(), eventId:event.id, name, flags, note}});
        added++;
      });
      notify(`${added}名をインポートしました`);
    };
    reader.readAsText(file,'UTF-8');
    e.target.value='';
  };

  return (
    <div className="main">
      <div className="page-header">
        <div className="page-title">参加者管理</div>
        <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
          <label className="btn btn-outline btn-sm" style={{cursor:'pointer'}}>
            📥 インポート<input type="file" accept=".csv" onChange={importCSV} style={{display:'none'}}/>
          </label>
          <button className="btn btn-outline btn-sm" onClick={exportCSV}>📤 エクスポート</button>
          <button className="btn btn-accent btn-sm" onClick={openAdd}>＋ 追加</button>
        </div>
      </div>
      <div className="mb-3"><input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="名前で検索…" style={{maxWidth:280}}/></div>
      <div className="card">
        {filtered.length === 0 ? (
          <div className="empty-state"><div className="empty-state-icon">👥</div><div>参加者がいません</div></div>
        ) : (
          filtered.map(a => {
            const ngs = getNGsFor(a.id);
            return (
              <div key={a.id} className="attendee-row">
                <div>
                  <div className="attendee-name">{a.name}</div>
                  <div className="attendee-flags">
                    {a.flags.map(f=><span key={f} className="tag">{f}</span>)}
                    {ngs.map(ng=>{
                      const other = attendees.find(x=>x.id===ng.otherId);
                      return <span key={ng.id} className="tag tag-ng">NG: {other?.name||'?'}</span>;
                    })}
                  </div>
                  {a.note && <div className="text-sm text-muted" style={{marginTop:'0.2rem'}}>{a.note}</div>}
                </div>
                <div className="attendee-row-actions">
                  <button className="btn btn-outline btn-sm" onClick={()=>openNG(a)}>NG設定</button>
                  <button className="btn btn-outline btn-sm" onClick={()=>openEdit(a)}>編集</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>del(a.id)}>削除</button>
                </div>
              </div>
            );
          })
        )}
      </div>

      {/* Add/Edit Modal */}
      {(modal==='add'||modal==='edit') && (
        <Modal title={modal==='add'?'参加者を追加':'参加者を編集'} onClose={()=>setModal(null)}
          footer={<><button className="btn btn-outline" onClick={()=>setModal(null)}>キャンセル</button><button className="btn btn-accent" onClick={save}>保存</button></>}>
          <div><label>名前 *</label><input type="text" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/></div>
          <div><label>フラグ（複数可）</label><TagInput tags={form.flags} onChange={flags=>setForm(f=>({...f,flags}))}/></div>
          <div><label>メモ（任意）</label><input type="text" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
        </Modal>
      )}

      {/* NG Modal */}
      {modal==='ng' && ngTarget && (
        <Modal title={`NGペア設定 — ${ngTarget.name}`} onClose={()=>setModal(null)}>
          <div>
            <div className="text-sm text-muted mb-2">現在のNGペア</div>
            {ngTargetNGs.length===0
              ? <div className="text-sm text-muted">なし</div>
              : ngTargetNGs.map(ng=>{
                  const other = attendees.find(x=>x.id===ng.otherId);
                  return (
                    <div key={ng.id} className="flex items-center justify-between" style={{padding:'0.35rem 0', borderBottom:'1px solid var(--border)'}}>
                      <span className="tag tag-ng">NG: {other?.name||'?'}</span>
                      <button className="btn btn-ghost btn-sm" onClick={()=>delNG(ng.id)}>解除</button>
                    </div>
                  );
                })
            }
          </div>
          <div>
            <div className="text-sm text-muted mb-2">NG追加（クリックで選択）</div>
            <input type="text" value={ngSearch} onChange={e=>setNgSearch(e.target.value)} placeholder="名前で検索…" className="mb-2"/>
            <div style={{maxHeight:220, overflowY:'auto', display:'flex', flexDirection:'column', gap:'0.3rem'}}>
              {ngCandidates.filter(a=>!ngTargetNGs.some(ng=>ng.otherId===a.id)).map(a=>(
                <button key={a.id} className="btn btn-outline" style={{justifyContent:'flex-start', textAlign:'left'}} onClick={()=>addNG(a.id)}>{a.name}</button>
              ))}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ============================================================
// Reducer
// ============================================================
function reducer(state, action) {
  const touch = (events, eventId) => events.map(e=>e.id===eventId?{...e, updatedAt:now()}:e);
  const updEvent = (id, fn) => ({
    ...state,
    events: touch(state.events.map(e => e.id===id ? sanitizeEvent(fn(e)) : e), id)
  });

  switch (action.type) {
    case 'SET_STATE': return action.payload;
    case 'ADD_EVENT': return {...state, events:[...state.events, sanitizeEvent({...action.payload, tables:[], attendees:[], ngPairs:[], assignments:{}, lockedAttendees:{}})], currentEventId: action.payload.id };
    case 'UPDATE_EVENT': return {
      ...state,
      events: state.events.map(e => e.id===action.payload.id
        ? sanitizeEvent({...e, name: action.payload.name, datetime: action.payload.datetime, updatedAt: now()})
        : e)
    };
    case 'DELETE_EVENT': return {...state, events:state.events.filter(e=>e.id!==action.payload), currentEventId: state.currentEventId===action.payload?null:state.currentEventId};
    case 'DUPLICATE_EVENT': {
      const src = state.events.find(e=>e.id===action.payload.src.id);
      if (!src) return state;
      const newId = action.payload.newId;
      const clone = sanitizeEvent({...src, id:newId, name:src.name+' (コピー)', createdAt:now(), updatedAt:now(),
        tables:src.tables.map(t=>({...t,id:uid(),eventId:newId})),
        attendees:src.attendees.map(a=>({...a,id:uid(),eventId:newId})),
        ngPairs:[], assignments:{}, lockedAttendees:{}});
      return {...state, events:[...state.events, clone]};
    }
    case 'IMPORT_EVENT': {
      const ev = sanitizeEvent({...action.payload, updatedAt:now()});
      return {...state, events:[...state.events, ev], currentEventId: ev.id};
    }
    case 'SET_CURRENT': return {...state, currentEventId: action.payload};

    case 'UPDATE_EVENT_FIELD': return updEvent(action.eventId, e=>({...e, [action.key]: action.val}));

    case 'ADD_TABLE': return updEvent(action.eventId, e=>({...e, tables:[...( e.tables||[]), action.payload]}));
    case 'DEL_TABLE': return updEvent(action.eventId, e=>({...e, tables:(e.tables||[]).filter(t=>t.id!==action.tableId)}));
    case 'UPDATE_TABLE': return updEvent(action.eventId, e=>({...e, tables:(e.tables||[]).map(t=>t.id===action.tableId?{...t,[action.key]:action.val}:t)}));
    case 'MOVE_TABLE_POS': return updEvent(action.eventId, e=>({...e, tables:(e.tables||[]).map(t=>t.id===action.tableId?{...t,posX:action.posX,posY:action.posY}:t)}));
    case 'MOVE_TABLE': return updEvent(action.eventId, e=>{
      const ts=[...(e.tables||[])];
      const {idx,dir}=action;
      const ni=idx+dir;
      if(ni<0||ni>=ts.length) return e;
      [ts[idx],ts[ni]]=[ts[ni],ts[idx]];
      return {...e,tables:ts};
    });

    case 'ADD_ATTENDEE': return updEvent(action.eventId, e=>({...e, attendees:[...(e.attendees||[]), action.payload]}));
    case 'UPDATE_ATTENDEE': return updEvent(action.eventId, e=>({...e, attendees:(e.attendees||[]).map(a=>a.id===action.id?{...a,...action.payload}:a)}));
    case 'DEL_ATTENDEE': return updEvent(action.eventId, e=>({...e, attendees:(e.attendees||[]).filter(a=>a.id!==action.id), assignments:Object.fromEntries(Object.entries(e.assignments||{}).map(([k,v])=>[k,v===action.id?null:v])), lockedAttendees:Object.fromEntries(Object.entries(e.lockedAttendees||{}).filter(([k])=>k!==action.id))}));

    case 'ADD_NG': return updEvent(action.eventId, e=>({...e, ngPairs:[...(e.ngPairs||[]), action.payload]}));
    case 'DEL_NG': return updEvent(action.eventId, e=>({...e, ngPairs:(e.ngPairs||[]).filter(p=>p.id!==action.id)}));

    case 'ASSIGN': return updEvent(action.eventId, e=>({...e, assignments:{...(e.assignments||{}), [action.seatId]: action.attendeeId}}));
    case 'BATCH_ASSIGN': return updEvent(action.eventId, e=>({...e, assignments:{...(e.assignments||{}), ...action.updates}}));
    case 'CLEAR_ASSIGN': return updEvent(action.eventId, e=>({...e, assignments:{}, lockedAttendees:{}}));
    case 'SET_ATTENDEE_LOCK': return updEvent(action.eventId, e=>({
      ...e,
      lockedAttendees: action.locked
        ? {...(e.lockedAttendees||{}), [action.attendeeId]: true}
        : Object.fromEntries(Object.entries(e.lockedAttendees||{}).filter(([k])=>k!==action.attendeeId))
    }));

    default: return state;
  }
}


// ============================================================
// ViewPage (共有URL閲覧専用)
// ============================================================
function ViewPage({ event }) {
  const tables = event.tables || [];
  const attendees = event.attendees || [];
  const assignments = event.assignments || {};
  const seats = useMemo(()=>generateSeats(tables.map(t=>({...t,eventId:event.id}))), [tables, event.id]);

  return (
    <div className="main">
      <div className="view-banner">
        👁 閲覧専用モード — <b style={{color:'var(--ink)'}}>{event.name}</b>
        {event.datetime && <span style={{marginLeft:'1rem'}}>📅 {event.datetime}</span>}
      </div>
      {tables.map(table => {
        const tableSeats = seats.filter(s=>s.tableId===table.id);
        return (
          <div key={table.id} className="table-assign-card" style={{marginBottom:'1rem'}}>
            <div className="table-assign-head">
              <div className="table-assign-head-name">{table.name}</div>
              <span className="stat-pill">{tableSeats.filter(s=>assignments[s.id]).length}/{table.seatCount}席</span>
            </div>
            <div className="seats-grid">
              {tableSeats.map(s => {
                const att = assignments[s.id] ? attendees.find(a=>a.id===assignments[s.id]) : null;
                return (
                  <div key={s.id} className={`seat-slot ${att?'filled':''}`} style={{cursor:'default'}}>
                    {att ? (
                      <>
                        <div className="seat-attendee-name">{att.name}</div>
                        {att.flags.length>0&&<div style={{fontSize:'0.62rem',color:'var(--green)'}}>{att.flags.join(' ')}</div>}
                      </>
                    ) : <div className="seat-id-label">{s.id}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// App
// ============================================================
function App() {
  // 共有URLチェック
  const sharedEvent = useMemo(() => loadSharedEvent(), []);
  if (sharedEvent) {
    return (
      <>
        <div className="topbar">
          <div className="topbar-logo">The<span>SEKI</span></div>
          <nav className="topbar-nav"><span className="nav-btn active">座席表 閲覧</span></nav>
        </div>
        <ViewPage event={sharedEvent}/>
      </>
    );
  }

  const saved = loadState();
  const [state, dispatch_] = React.useReducer(reducer, saved || DEFAULT_STATE);
  const [page, setPage] = useState('events');
  const [note, notify] = useNotify();
  const [saveStatus, setSaveStatus] = useState('saved');
  const saveTimer = useRef(null);

  // 自動保存（デバウンス100ms）＋ステータス表示
  useEffect(() => {
    setSaveStatus('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      saveState(state);
      setSaveStatus('saved');
    }, 100);
  }, [state]);

  // localStorage容量超過エラー
  useEffect(() => {
    const handler = () => {
      setSaveStatus('error');
      notify('保存に失敗しました。ストレージ容量が不足している可能性があります。', 'error');
    };
    window.addEventListener('theseki:saveerror', handler);
    return () => window.removeEventListener('theseki:saveerror', handler);
  }, [notify]);

  const dispatch = useCallback((action) => dispatch_(action), []);
  const currentEvent = state.events.find(e=>e.id===state.currentEventId);

  const selectEvent = (id) => {
    dispatch({type:'SET_CURRENT', payload:id});
    setPage('attendees');
  };

  // JSONバックアップ
  const handleExportJSON = () => {
    if (!currentEvent) return;
    exportEventJSON(currentEvent);
    notify('JSONバックアップをダウンロードしました');
  };

  // JSONインポート
  const handleImportJSON = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = parseImportedEvent(ev.target.result);
        dispatch({type:'IMPORT_EVENT', payload:imported});
        setPage('layout');
        notify(`「${imported.name}」をインポートしました`, 'success');
      } catch(err) {
        notify(`インポート失敗: ${err.message}`, 'error');
      }
    };
    reader.readAsText(file,'UTF-8');
    e.target.value='';
  };

  // 閲覧用URL共有
  const handleShare = () => {
    if (!currentEvent) return;
    const url = buildShareURL(currentEvent);
    if (!url) { notify('URL生成に失敗しました', 'error'); return; }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(()=>notify('共有URLをクリップボードにコピーしました'));
    } else {
      prompt('この URLを共有してください:', url);
    }
  };

  const navItems = [
    {id:'events', label:'イベント一覧'},
    ...(currentEvent ? [{id:'attendees', label:'参加者管理'}] : []),
  ];

  const statusColor = saveStatus==='error'?'var(--accent)': saveStatus==='saving'?'var(--accent-gold)':'#4caf82';
  const statusLabel = saveStatus==='error'?'保存エラー ⚠️': saveStatus==='saving'?'保存中…':'保存済 ✓';

  // イベント内サブページ用のブレッドクラム＋タブバー
  const InnerNav = ({ subPage, setSubPage }) => (
    <div className={`inner-nav-wrap ${(subPage==='layout'||subPage==='assign')?'subpage-fixed':''}`}>
      <button className="btn btn-ghost btn-sm inner-nav-back" onClick={()=>setPage('events')}
        style={{color:'var(--ink-light)',padding:'0.3rem 0.5rem',whiteSpace:'nowrap'}}>
        ← 一覧
      </button>
      <span style={{color:'var(--border)'}}>|</span>
      <span className="inner-nav-title" style={{fontSize:'0.82rem',fontWeight:600,color:'var(--ink)',fontFamily:"'Noto Serif JP',serif"}}>
        {currentEvent?.name}
      </span>
      <div className="inner-nav-tabs" style={{marginLeft:'auto',display:'flex',gap:'0.4rem'}}>
        {[{id:'layout',label:'🪑 会場'},{id:'assign',label:'🎲 席割り'}].map(t=>(
          <button key={t.id}
            className={`btn btn-sm ${subPage===t.id?'btn-primary':'btn-outline'}`}
            onClick={()=>setSubPage(t.id)}>
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );

  return (
    <>
      <div className={`topbar ${(page==='layout'||page==='assign')?'topbar-subpage':''}`}>
        <div className="topbar-logo">The<span>SEKI</span></div>
        <nav className="topbar-nav">
          {navItems.map(n=>(
            <button key={n.id} className={`nav-btn ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>{n.label}</button>
          ))}
        </nav>
        <div className="topbar-actions-desktop" style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'0.75rem'}}>
          <span className="topbar-status" style={{color:statusColor}}>{statusLabel}</span>
          <label className="btn btn-ghost btn-sm" style={{cursor:'pointer',color:'rgba(255,255,255,0.55)',fontSize:'0.75rem'}}>
            📂 復元<input type="file" accept=".json" onChange={handleImportJSON} style={{display:'none'}}/>
          </label>
          {currentEvent && <button className="btn btn-ghost btn-sm" onClick={handleExportJSON} style={{color:'rgba(255,255,255,0.55)',fontSize:'0.75rem'}}>💾 バックアップ</button>}
          {currentEvent && <button className="btn btn-ghost btn-sm" onClick={handleShare} style={{color:'rgba(255,255,255,0.55)',fontSize:'0.75rem'}}>🔗 共有URL</button>}
        </div>
      </div>

      {page==='events' && <EventsPage state={state} dispatch={dispatch} onSelect={selectEvent} onLayout={(id)=>{dispatch({type:'SET_CURRENT',payload:id});setPage('layout');}} onAssign={(id)=>{dispatch({type:'SET_CURRENT',payload:id});setPage('assign');}}/>}
      {page==='attendees' && currentEvent && <AttendeesPage event={currentEvent} dispatch={dispatch} notify={notify}/>}
      {(page==='layout'||page==='assign') && currentEvent && (
        <div className="event-subpage-shell" style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 52px)'}}>
          <InnerNav subPage={page} setSubPage={setPage}/>
          <div className="event-subpage-content" style={{minHeight:0, WebkitOverflowScrolling:'touch'}}>
            {page==='layout' && <LayoutPage event={currentEvent} dispatch={dispatch} notify={notify}/>}
            {page==='assign' && <AssignPage event={currentEvent} dispatch={dispatch} notify={notify}/>}
          </div>
        </div>
      )}

      {note && <div className={`notification ${note.type}`}>{note.msg}</div>}
    </>
  );
}

const rootEl = document.getElementById('root');
if (ReactDOM.createRoot) {
  ReactDOM.createRoot(rootEl).render(<App/>);
} else {
  ReactDOM.render(<App/>, rootEl);
}
</script>
<div id="app-copyright" aria-hidden="true">©DaC Kogure</div>
</body>
</html>
