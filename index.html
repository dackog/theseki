// ============================================================
// AttendeesPage
// ============================================================
function AttendeesPage({ event, dispatch, notify }) {
  const attendees = event.attendees || [];
  const ngPairs = event.ngPairs || [];
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null); // null | 'add' | 'edit' | 'ng'
  const [editTarget, setEditTarget] = useState(null);
  const [form, setForm] = useState({ name:'', flags:[], note:'' });
  const [ngTarget, setNgTarget] = useState(null);
  const [ngSearch, setNgSearch] = useState('');

  const openAdd = () => { setForm({name:'',flags:[],note:''}); setModal('add'); };
  const openEdit = (a) => { setEditTarget(a); setForm({name:a.name, flags:[...a.flags], note:a.note||''}); setModal('edit'); };
  const openNG = (a) => { setNgTarget(a); setNgSearch(''); setModal('ng'); };

  const save = () => {
    if (!form.name.trim()) return;
    if (modal === 'add') {
      dispatch({type:'ADD_ATTENDEE', eventId:event.id, payload:{id:uid(), eventId:event.id, name:form.name.trim(), flags:form.flags, note:form.note}});
      notify('参加者を追加しました');
    } else {
      dispatch({type:'UPDATE_ATTENDEE', eventId:event.id, id:editTarget.id, payload:{name:form.name.trim(), flags:form.flags, note:form.note}});
      notify('更新しました');
    }
    setModal(null);
  };
  const del = (id) => {
    if (confirm('この参加者を削除しますか？')) {
      dispatch({type:'DEL_ATTENDEE', eventId:event.id, id});
      notify('削除しました');
    }
  };

  const addNG = (bId) => {
    if (ngTarget.id === bId) return;
    const exists = ngPairs.some(p => (p.a===ngTarget.id&&p.b===bId)||(p.a===bId&&p.b===ngTarget.id));
    if (!exists) {
      const [a,b] = [ngTarget.id, bId].sort();
      dispatch({type:'ADD_NG', eventId:event.id, payload:{id:uid(), a, b}});
      notify('NGペアを登録しました');
    }
  };
  const delNG = (id) => dispatch({type:'DEL_NG', eventId:event.id, id});

  const getNGsFor = (aId) => ngPairs
    .filter(p=>p.a===aId||p.b===aId)
    .map(p=>({ id:p.id, otherId: p.a===aId?p.b:p.a }));

  const filtered = attendees.filter(a=>a.name.includes(search));
  const ngTargetNGs = ngTarget ? getNGsFor(ngTarget.id) : [];
  const ngCandidates = ngTarget ? attendees.filter(a=>a.id!==ngTarget.id&&a.name.includes(ngSearch)) : [];

  // CSV export
  const exportCSV = () => {
    const rows = [['name','flags','note'],...attendees.map(a=>[a.name, a.flags.join('|'), a.note||''])];
    const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`theseki_attendees_${event.id}.csv`; a.click();
    URL.revokeObjectURL(url);
    notify('CSVをエクスポートしました');
  };

  // CSV import
  const importCSV = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result.replace(/^\uFEFF/,'');
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
      let added = 0;
      lines.slice(1).forEach(line => {
        const cols = line.match(/("(?:[^"]|"")*"|[^,]*),?/g)?.map(c=>c.replace(/,$/, '').replace(/^"|"$/g,'').replace(/""/g,'"').trim()) || [];
        const name = cols[headers.indexOf('name')] || '';
        if (!name) return;
        const flagsRaw = cols[headers.indexOf('flags')] || '';
        const flags = flagsRaw ? flagsRaw.split('|').map(f=>f.trim()).filter(Boolean) : [];
        const note = cols[headers.indexOf('note')] || '';
        dispatch({type:'ADD_ATTENDEE', eventId:event.id, payload:{id:uid(), eventId:event.id, name, flags, note}});
        added++;
      });
      notify(`${added}名をインポートしました`);
    };
    reader.readAsText(file,'UTF-8');
    e.target.value='';
  };

  return (
    <div className="main">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.75rem',flexWrap:'wrap',gap:'0.5rem'}}>
        <div className="page-title" style={{marginBottom:0}}>参加者管理</div>
        <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
          <label className="btn btn-outline btn-sm" style={{cursor:'pointer'}}>
            📥 インポート<input type="file" accept=".csv" onChange={importCSV} style={{display:'none'}}/>
          </label>
          <button className="btn btn-outline btn-sm" onClick={exportCSV}>📤 エクスポート</button>
          <button className="btn btn-accent btn-sm" onClick={openAdd}>＋ 追加</button>
        </div>
      </div>
      <div className="mb-3"><input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="名前で検索…" style={{maxWidth:280}}/></div>
      <div className="card">
        {filtered.length === 0 ? (
          <div className="empty-state"><div className="empty-state-icon">👥</div><div>参加者がいません</div></div>
        ) : (
          filtered.map(a => {
            const ngs = getNGsFor(a.id);
            return (
              <div key={a.id} className="attendee-row">
                <div>
                  <div className="attendee-name">{a.name}</div>
                  <div className="attendee-flags">
                    {a.flags.map(f=><span key={f} className="tag">{f}</span>)}
                    {ngs.map(ng=>{
                      const other = attendees.find(x=>x.id===ng.otherId);
                      return <span key={ng.id} className="tag tag-ng">NG: {other?.name||'?'}</span>;
                    })}
                  </div>
                  {a.note && <div className="text-sm text-muted" style={{marginTop:'0.2rem'}}>{a.note}</div>}
                </div>
                <div className="attendee-row-actions">
                  <button className="btn btn-outline btn-sm" onClick={()=>openNG(a)}>NG設定</button>
                  <button className="btn btn-outline btn-sm" onClick={()=>openEdit(a)}>編集</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>del(a.id)}>削除</button>
                </div>
              </div>
            );
          })
        )}
      </div>

      {/* Add/Edit Modal */}
      {(modal==='add'||modal==='edit') && (
        <Modal title={modal==='add'?'参加者を追加':'参加者を編集'} onClose={()=>setModal(null)}
          footer={<><button className="btn btn-outline" onClick={()=>setModal(null)}>キャンセル</button><button className="btn btn-accent" onClick={save}>保存</button></>}>
          <div><label>名前 *</label><input type="text" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/></div>
          <div><label>フラグ（複数可）</label><TagInput tags={form.flags} onChange={flags=>setForm(f=>({...f,flags}))}/></div>
          <div><label>メモ（任意）</label><input type="text" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
        </Modal>
      )}

      {/* NG Modal */}
      {modal==='ng' && ngTarget && (
        <Modal title={`NGペア設定 — ${ngTarget.name}`} onClose={()=>setModal(null)}>
          <div>
            <div className="text-sm text-muted mb-2">現在のNGペア</div>
            {ngTargetNGs.length===0
              ? <div className="text-sm text-muted">なし</div>
              : ngTargetNGs.map(ng=>{
                  const other = attendees.find(x=>x.id===ng.otherId);
                  return (
                    <div key={ng.id} className="flex items-center justify-between" style={{padding:'0.35rem 0', borderBottom:'1px solid var(--border)'}}>
                      <span className="tag tag-ng">NG: {other?.name||'?'}</span>
                      <button className="btn btn-ghost btn-sm" onClick={()=>delNG(ng.id)}>解除</button>
                    </div>
                  );
                })
            }
          </div>
          <div>
            <div className="text-sm text-muted mb-2">NG追加（クリックで選択）</div>
            <input type="text" value={ngSearch} onChange={e=>setNgSearch(e.target.value)} placeholder="名前で検索…" className="mb-2"/>
            <div style={{maxHeight:220, overflowY:'auto', display:'flex', flexDirection:'column', gap:'0.3rem'}}>
              {ngCandidates.filter(a=>!ngTargetNGs.some(ng=>ng.otherId===a.id)).map(a=>(
                <button key={a.id} className="btn btn-outline" style={{justifyContent:'flex-start', textAlign:'left'}} onClick={()=>addNG(a.id)}>{a.name}</button>
              ))}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ============================================================
// Reducer
// ============================================================
function reducer(state, action) {
  const touch = (events, eventId) => events.map(e=>e.id===eventId?{...e, updatedAt:now()}:e);
  const updEvent = (id, fn) => ({
    ...state,
    events: touch(state.events.map(e => e.id===id ? sanitizeEvent(fn(e)) : e), id)
  });

  switch (action.type) {
    case 'SET_STATE': return action.payload;
    case 'ADD_EVENT': return {...state, events:[...state.events, sanitizeEvent({...action.payload, tables:[], attendees:[], ngPairs:[], assignments:{}, lockedAttendees:{}})], currentEventId: action.payload.id };
    case 'UPDATE_EVENT': return {
      ...state,
      events: state.events.map(e => e.id===action.payload.id
        ? sanitizeEvent({...e, name: action.payload.name, datetime: action.payload.datetime, updatedAt: now()})
        : e)
    };
    case 'DELETE_EVENT': return {...state, events:state.events.filter(e=>e.id!==action.payload), currentEventId: state.currentEventId===action.payload?null:state.currentEventId};
    case 'DUPLICATE_EVENT': {
      const src = state.events.find(e=>e.id===action.payload.src.id);
      if (!src) return state;
      const newId = action.payload.newId;
      const clone = sanitizeEvent({...src, id:newId, name:src.name+' (コピー)', createdAt:now(), updatedAt:now(),
        tables:src.tables.map(t=>({...t,id:uid(),eventId:newId})),
        attendees:src.attendees.map(a=>({...a,id:uid(),eventId:newId})),
        ngPairs:[], assignments:{}, lockedAttendees:{}});
      return {...state, events:[...state.events, clone]};
    }
    case 'IMPORT_EVENT': {
      const ev = sanitizeEvent({...action.payload, updatedAt:now()});
      return {...state, events:[...state.events, ev], currentEventId: ev.id};
    }
    case 'SET_CURRENT': return {...state, currentEventId: action.payload};

    case 'UPDATE_EVENT_FIELD': return updEvent(action.eventId, e=>({...e, [action.key]: action.val}));

    case 'ADD_TABLE': return updEvent(action.eventId, e=>({...e, tables:[...( e.tables||[]), action.payload]}));
    case 'DEL_TABLE': return updEvent(action.eventId, e=>({...e, tables:(e.tables||[]).filter(t=>t.id!==action.tableId)}));
    case 'UPDATE_TABLE': return updEvent(action.eventId, e=>({...e, tables:(e.tables||[]).map(t=>t.id===action.tableId?{...t,[action.key]:action.val}:t)}));
    case 'MOVE_TABLE_POS': return updEvent(action.eventId, e=>({...e, tables:(e.tables||[]).map(t=>t.id===action.tableId?{...t,posX:action.posX,posY:action.posY}:t)}));
    case 'MOVE_TABLE': return updEvent(action.eventId, e=>{
      const ts=[...(e.tables||[])];
      const {idx,dir}=action;
      const ni=idx+dir;
      if(ni<0||ni>=ts.length) return e;
      [ts[idx],ts[ni]]=[ts[ni],ts[idx]];
      return {...e,tables:ts};
    });

    case 'ADD_ATTENDEE': return updEvent(action.eventId, e=>({...e, attendees:[...(e.attendees||[]), action.payload]}));
    case 'UPDATE_ATTENDEE': return updEvent(action.eventId, e=>({...e, attendees:(e.attendees||[]).map(a=>a.id===action.id?{...a,...action.payload}:a)}));
    case 'DEL_ATTENDEE': return updEvent(action.eventId, e=>({...e, attendees:(e.attendees||[]).filter(a=>a.id!==action.id), assignments:Object.fromEntries(Object.entries(e.assignments||{}).map(([k,v])=>[k,v===action.id?null:v])), lockedAttendees:Object.fromEntries(Object.entries(e.lockedAttendees||{}).filter(([k])=>k!==action.id))}));

    case 'ADD_NG': return updEvent(action.eventId, e=>({...e, ngPairs:[...(e.ngPairs||[]), action.payload]}));
    case 'DEL_NG': return updEvent(action.eventId, e=>({...e, ngPairs:(e.ngPairs||[]).filter(p=>p.id!==action.id)}));

    case 'ASSIGN': return updEvent(action.eventId, e=>({...e, assignments:{...(e.assignments||{}), [action.seatId]: action.attendeeId}}));
    case 'BATCH_ASSIGN': return updEvent(action.eventId, e=>({...e, assignments:{...(e.assignments||{}), ...action.updates}}));
    case 'CLEAR_ASSIGN': return updEvent(action.eventId, e=>({...e, assignments:{}, lockedAttendees:{}}));
    case 'SET_ATTENDEE_LOCK': return updEvent(action.eventId, e=>({
      ...e,
      lockedAttendees: action.locked
        ? {...(e.lockedAttendees||{}), [action.attendeeId]: true}
        : Object.fromEntries(Object.entries(e.lockedAttendees||{}).filter(([k])=>k!==action.attendeeId))
    }));

    default: return state;
  }
}

function ViewPage({ event }) {
  const tables = event.tables || [];
  const attendees = event.attendees || [];

            <div className="table-assign-head">

              {tableSeats.map(s => {
                const att = assignments[s.id] ? attendees.find(a=>a.id===assignments[s.id]) : null;
                return (
                  <div key={s.id} className={`seat-slot ${att?'filled':''}`} style={{cursor:'default'}}>

                        <div className="seat-attendee-name">{att.name}</div>

        </nav>
        <div className="topbar-actions-desktop" style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'0.75rem'}}>
          <span style={{fontSize:'0.72rem',color:statusColor,transition:'color 0.3s',minWidth:56}}>{statusLabel}</span>
          <label className="btn btn-ghost btn-sm" style={{cursor:'pointer',color:'rgba(255,255,255,0.55)',fontSize:'0.75rem'}}>
            📂 復元<input type="file" accept=".json" onChange={handleImportJSON} style={{display:'none'}}/>
          </label>
          {currentEvent && <button className="btn btn-ghost btn-sm" onClick={handleExportJSON} style={{color:'rgba(255,255,255,0.55)',fontSize:'0.75rem'}}>💾 バックアップ</button>}
          {currentEvent && <button className="btn btn-ghost btn-sm" onClick={handleShare} style={{color:'rgba(255,255,255,0.55)',fontSize:'0.75rem'}}>🔗 共有URL</button>}
        </div>
      </div>

      {page==='events' && <EventsPage state={state} dispatch={dispatch} onSelect={selectEvent} onLayout={(id)=>{dispatch({type:'SET_CURRENT',payload:id});setPage('layout');}} onAssign={(id)=>{dispatch({type:'SET_CURRENT',payload:id});setPage('assign');}}/>}
      {page==='attendees' && currentEvent && <AttendeesPage event={currentEvent} dispatch={dispatch} notify={notify}/>}
      {(page==='layout'||page==='assign') && currentEvent && (
        <div className="event-subpage-shell" style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 52px)'}}>
          <InnerNav subPage={page} setSubPage={setPage}/>
          <div className="event-subpage-content" style={{minHeight:0, WebkitOverflowScrolling:'touch'}}>
            {page==='layout' && <LayoutPage event={currentEvent} dispatch={dispatch} notify={notify}/>}
            {page==='assign' && <AssignPage event={currentEvent} dispatch={dispatch} notify={notify}/>}
          </div>
        </div>
      )}

      {note && <div className={`notification ${note.type}`}>{note.msg}</div>}
    </>
  );
}

const rootEl = document.getElementById('root');
if (ReactDOM.createRoot) {
  ReactDOM.createRoot(rootEl).render(<App/>);
} else {
  ReactDOM.render(<App/>, rootEl);
}
</script>
</body>
</html>
